<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RangerTrack" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>RangerTrack</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f0f0f'/><text y='.9em' font-size='80' x='10'>🚗</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #f97316; --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
      --bg: #0f0f0f; --bg2: #181818; --bg3: #222; --border: #2a2a2a;
      --muted: #555; --text: #deded6;
      --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
    #app { display:flex; flex-direction:column; height:100dvh; max-width:700px; margin:0 auto; }

    /* HEADER */
    .header { padding:calc(var(--safe-top) + 12px) 18px 12px; background:var(--bg2); border-bottom:2px solid var(--orange); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
    .header-logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:24px; letter-spacing:3px; text-transform:uppercase; }
    .header-logo span { color:var(--orange); }
    .header-sub { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:1px; }
    .kwh-pill { font-size:11px; background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:4px 10px; color:var(--muted); cursor:pointer; white-space:nowrap; }
    .kwh-pill.set { border-color:var(--green); color:var(--green); }

    /* TABS */
    .tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
    .tab { flex:1; padding:12px 4px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.2s; -webkit-tap-highlight-color:transparent; }
    .tab.active { color:var(--orange); border-bottom-color:var(--orange); }
    .tab.active-green { color:var(--green); border-bottom-color:var(--green); }

    /* SCROLL */
    .scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 14px calc(var(--safe-bottom)+20px); }

    /* CARDS */
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
    .card.active { border-color:var(--orange); }
    .card.active-green { border-color:var(--green); }
    .card.faded { opacity:0.55; }
    .card-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .step-check { margin-left:auto; color:var(--green); }

    /* WIZARD DOTS */
    .wizard-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .step-dots { display:flex; gap:6px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.2s; }
    .dot.done { background:var(--orange); }
    .dot.active { background:var(--orange); box-shadow:0 0 0 3px rgba(249,115,22,0.25); }
    .step-lbl { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }

    /* UPLOAD */
    .upload-area { border:2px dashed var(--border); border-radius:6px; padding:18px; text-align:center; cursor:pointer; position:relative; transition:all 0.2s; margin-bottom:10px; -webkit-tap-highlight-color:transparent; }
    .upload-area input { position:absolute; inset:0; opacity:0; width:100%; height:100%; cursor:pointer; }
    .upload-area:active,.upload-area:hover { border-color:var(--orange); background:rgba(249,115,22,0.05); }
    .upload-area.green:active,.upload-area.green:hover { border-color:var(--green); background:rgba(34,197,94,0.05); }
    .upload-icon { font-size:26px; margin-bottom:4px; }
    .upload-text { font-size:12px; color:var(--muted); line-height:1.5; }
    .upload-preview { max-height:80px; max-width:100%; border-radius:4px; }

    /* EXTRACTED */
    .extracted { background:var(--bg3); border-radius:6px; padding:12px; margin-bottom:10px; }
    .ex-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid var(--border); }
    .ex-row:last-child { border-bottom:none; }
    .ex-key { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .ex-val { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; color:var(--orange); }
    .ex-val.g { color:var(--green); } .ex-val.b { color:var(--blue); }

    /* FORM */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .form-grid.three { grid-template-columns:1fr 1fr 1fr; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .field input { background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:10px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; outline:none; width:100%; -webkit-appearance:none; transition:border-color 0.2s; }
    .field input:focus { border-color:var(--orange); }
    .field input.green:focus { border-color:var(--green); }
    .field input[type=date] { color-scheme:dark; }

    /* BUTTONS */
    .btn { padding:13px 20px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; border:none; border-radius:5px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity 0.15s; width:100%; display:block; }
    .btn:active { opacity:0.7; }
    .btn-o { background:var(--orange); color:#000; }
    .btn-g { background:var(--green); color:#000; }
    .btn-ghost { background:var(--bg3); border:1px solid var(--border); color:var(--muted); }
    .btn-sm { padding:8px 14px; font-size:11px; width:auto; display:inline-block; }
    .btn-row { display:flex; gap:8px; }

    /* LOADING */
    .loading { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; padding:6px 0; }
    .spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
    .spinner.g { border-top-color:var(--green); }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* SUMMARY */
    .summary-box { background:var(--bg2); border:1px solid var(--orange); border-radius:8px; padding:16px; margin-bottom:12px; }
    .summary-title { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .sum-item .sum-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
    .sum-item .sum-val { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; line-height:1; }
    .sum-unit { font-size:11px; font-weight:400; color:var(--muted); }

    /* RIMBORSO */
    .rimborso-box { background:rgba(34,197,94,0.08); border:1px solid var(--green); border-radius:8px; padding:16px; margin-bottom:12px; }
    .rimborso-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--green); margin-bottom:4px; }
    .rimborso-amount { font-family:'Barlow Condensed',sans-serif; font-size:48px; font-weight:900; color:var(--green); line-height:1; }
    .rimborso-detail { font-size:11px; color:var(--muted); margin-top:4px; }
    .rimborso-rounded { font-size:13px; color:var(--green); margin-top:6px; }

    /* STATS BAR */
    .stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .stat-mini { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:10px; text-align:center; }
    .stat-mini-label { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
    .stat-mini-val { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; }

    /* HISTORY */
    .history-item { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:10px; }
    .history-date { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:flex; justify-content:space-between; }
    .history-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .hs-label { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .hs-val { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; }
    .history-rimborso { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted); }
    .history-rimborso strong { color:var(--green); font-family:'Barlow Condensed',sans-serif; font-size:16px; }
    .del-btn { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:2px 6px; }
    .del-btn:active { color:var(--red); }

    /* RIMBORSO TAB - ricariche list */
    .ricarica-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--border); background:var(--bg2); font-size:14px; }
    .ricarica-row:first-child { border-radius:6px 6px 0 0; }
    .ricarica-row:last-child { border-bottom:none; border-radius:0 0 6px 6px; }
    .ricarica-date { color:var(--muted); font-size:12px; min-width:80px; }
    .ricarica-kwh { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:var(--green); flex:1; }
    .ricarica-importo { font-size:13px; color:var(--muted); }
    .ricarica-importo strong { color:var(--text); }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; display:flex; align-items:flex-end; }
    .modal { background:var(--bg2); border-top:2px solid var(--orange); border-radius:16px 16px 0 0; padding:20px 18px calc(var(--safe-bottom)+20px); width:100%; max-height:85vh; overflow-y:auto; }
    .modal.green-top { border-top-color:var(--green); }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; }
    .modal-close { float:right; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }

    /* SECTION LABEL */
    .section-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; margin-top:4px; }
    .empty { text-align:center; padding:36px 20px; color:var(--muted); font-size:13px; line-height:1.7; background:var(--bg2); border:1px solid var(--border); border-radius:8px; }
    hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
    .warn { font-size:12px; color:var(--orange); margin-bottom:10px; }
    .info { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">RANGER<span>TRACK</span></div>
      <div class="header-sub">Ford Ranger PHEV</div>
    </div>
    <div class="kwh-pill" id="kwh-pill" onclick="openKwhModal()">⚡ €/kWh —</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-ciclo"     onclick="switchTab('ciclo')">🔄 Ciclo</button>
    <button class="tab"        id="tab-rimborso"  onclick="switchTab('rimborso')">🏢 Rimborso</button>
    <button class="tab"        id="tab-storico"   onclick="switchTab('storico')">📋 Storico</button>
    <button class="tab"        id="tab-bolletta"  onclick="switchTab('bolletta')">🧾 Bolletta</button>
  </div>
  <div class="scroll" id="main"></div>
</div>

<!-- MODAL €/kWh -->
<div class="modal-overlay" id="kwh-modal" style="display:none" onclick="if(event.target===this)closeModal('kwh-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('kwh-modal')">✕</button>
    <div class="modal-title">⚡ Costo €/kWh</div>
    <p class="info">Coefficiente tecnico applicato: calcolato come (Totale bolletta - Sconto soci - Quote fisse) / kWh totali. Escluse quote fisse e quota potenza.</p>
    <div class="field" style="margin-bottom:14px">
      <label>Coefficiente €/kWh</label>
      <input type="text" id="kwh-input" placeholder="es. 0.12673" inputmode="decimal" />
    </div>
    <button class="btn btn-o" onclick="saveKwh()">Salva</button>
  </div>
</div>

<!-- MODAL aggiungi ricarica manuale -->
<div class="modal-overlay" id="ricarica-modal" style="display:none" onclick="if(event.target===this)closeModal('ricarica-modal')">
  <div class="modal green-top">
    <button class="modal-close" onclick="closeModal('ricarica-modal')">✕</button>
    <div class="modal-title" style="color:var(--green)">➕ Aggiungi Ricarica</div>
    <div class="form-grid" style="margin-bottom:14px">
      <div class="field"><label>Data</label><input type="date" id="r-data" /></div>
      <div class="field"><label>kWh</label><input type="text" class="green" id="r-kwh" placeholder="es. 10.1" inputmode="decimal" /></div>
    </div>
    <div class="field" style="margin-bottom:14px"><label>Note (opzionale)</label><input type="text" id="r-note" placeholder="es. Via Sempione" /></div>
    <button class="btn btn-g" onclick="saveRicaricaManuale()">Aggiungi</button>
  </div>
</div>

<script>
// ─── STORAGE ──────────────────────────────────────────────────────────────────
const LS = {
  get:(k,d)=>{ try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'ciclo';
let costoKwh   = LS.get('rt_kwh','');
let history    = LS.get('rt_history_v2',[]);
let ricaricheAzienda = LS.get('rt_ricariche_az',[]);  // {id,data,kwh,note}
let bollettaRef = LS.get('rt_bolletta_ref', null);     // {numero,data,consumoTot,totaleFattura,scontoSoci,periodo}

let cycle = LS.get('rt_cycle',{
  step:0, cruscotto:null, scontrino:null, ricaricheCasa:null, ricaricheLavoro:null
});

function saveCycle(){ LS.set('rt_cycle',cycle); }
function saveRicariche(){ LS.set('rt_ricariche_az',ricaricheAzienda); }
function saveBolletta(){ LS.set('rt_bolletta_ref',bollettaRef); }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function num(v){ return parseFloat(String(v||'').replace(',','.'))||0; }
function fmtDate(d){ if(!d)return'—'; try{return new Date(d+'T12:00:00').toLocaleDateString('it-IT');}catch{return d;} }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function today(){ return new Date().toISOString().split('T')[0]; }
function round2(n){ return Math.round(n*100)/100; }

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
function openKwhModal(){ document.getElementById('kwh-input').value=costoKwh; openModal('kwh-modal'); }
function saveKwh(){
  costoKwh=document.getElementById('kwh-input').value.trim();
  LS.set('rt_kwh',costoKwh); closeModal('kwh-modal'); updateKwhPill(); render();
}
function updateKwhPill(){
  const p=document.getElementById('kwh-pill');
  if(costoKwh){ p.textContent='⚡ €'+num(costoKwh).toFixed(5)+'/kWh'; p.className='kwh-pill set'; }
  else{ p.textContent='⚡ €/kWh —'; p.className='kwh-pill'; }
}

// ─── TAB ─────────────────────────────────────────────────────────────────────
function switchTab(t){
  currentTab=t;
  ['ciclo','rimborso','storico','bolletta'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    el.className='tab'+(id===t?(t==='rimborso'?' active-green':' active'):'');
  });
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  updateKwhPill();
  const el=document.getElementById('main');
  if(currentTab==='ciclo')     el.innerHTML=renderCiclo();
  else if(currentTab==='rimborso') el.innerHTML=renderRimborso();
  else if(currentTab==='storico')  el.innerHTML=renderStorico();
  else                             el.innerHTML=renderBolletta();
  attachEvents();
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB CICLO
// ═══════════════════════════════════════════════════════════════════════════════
function renderCiclo(){
  const steps=[
    {key:'cruscotto',      icon:'🚗',label:'Foto Cruscotto',       done:!!cycle.cruscotto},
    {key:'scontrino',      icon:'⛽',label:'Scontrino Pompa',      done:!!cycle.scontrino},
    {key:'ricaricheCasa',  icon:'🏠',label:'Ricariche Casa',        done:!!cycle.ricaricheCasa},
    {key:'ricaricheLavoro',icon:'🏢',label:'Ricariche Lavoro',      done:!!cycle.ricaricheLavoro},
  ];
  const curStep=steps.findIndex(s=>!s.done);
  const allDone=curStep===-1;

  let html=`<div class="wizard-header">
    <div class="step-dots">`;
  steps.forEach((s,i)=>{
    const cls=s.done?'done':(i===curStep?'active':'');
    html+=`<div class="dot ${cls}"></div>`;
  });
  html+=`</div><div class="step-lbl">${allDone?'Pronto!':'Passo '+(curStep+1)+' di 4'}</div>`;
  if(cycle.cruscotto||cycle.scontrino||cycle.ricaricheCasa||cycle.ricaricheLavoro)
    html+=`<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="resetCycle()">Reset</button>`;
  html+=`</div>`;

  steps.forEach((s,i)=>{
    const isActive=i===curStep; const isDone=s.done;
    html+=`<div class="card${isDone?' faded':isActive?' active':''}">
      <div class="card-title"><span>${s.icon}</span>${s.label}${isDone?'<span class="step-check">✓</span>':''}</div>`;
    if(isDone)   html+=renderStepSummary(s.key);
    else if(isActive) html+=renderStepForm(s.key);
    html+=`</div>`;
  });

  if(allDone) html+=renderFinalSummary();
  return html;
}

function renderStepSummary(key){
  const d=cycle[key]; if(!d)return'';
  if(key==='cruscotto') return`<div class="extracted">
    <div class="ex-row"><span class="ex-key">KM Totali</span><span class="ex-val">${esc(d.kmTotali)}</span></div>
    <div class="ex-row"><span class="ex-key">KM Elettrico</span><span class="ex-val g">${esc(d.kmElettrico)}</span></div>
    <div class="ex-row"><span class="ex-key">Data</span><span style="font-size:13px">${fmtDate(d.data)}</span></div>
  </div>`;
  if(key==='scontrino'){const tot=num(d.litri)*num(d.prezzoLitro);return`<div class="extracted">
    <div class="ex-row"><span class="ex-key">Litri</span><span class="ex-val">${num(d.litri).toFixed(2)} L</span></div>
    <div class="ex-row"><span class="ex-key">€/Litro</span><span class="ex-val">€ ${num(d.prezzoLitro).toFixed(3)}</span></div>
    <div class="ex-row"><span class="ex-key">Totale</span><span class="ex-val">€ ${tot.toFixed(2)}</span></div>
    ${d.stazione?`<div class="ex-row"><span class="ex-key">Stazione</span><span style="font-size:12px">${esc(d.stazione)}</span></div>`:''}
  </div>`;}
  if(key==='ricaricheCasa'){const c=num(costoKwh)>0?(num(d.kwh)*num(costoKwh)).toFixed(2):'—';return`<div class="extracted">
    <div class="ex-row"><span class="ex-key">kWh Casa</span><span class="ex-val b">${num(d.kwh).toFixed(2)} kWh</span></div>
    ${costoKwh?`<div class="ex-row"><span class="ex-key">Costo</span><span class="ex-val">€ ${c}</span></div>`:''}
  </div>`;}
  if(key==='ricaricheLavoro'){const r=num(costoKwh)>0?(num(d.kwh)*num(costoKwh)).toFixed(2):'—';return`<div class="extracted">
    <div class="ex-row"><span class="ex-key">kWh Lavoro</span><span class="ex-val g">${num(d.kwh).toFixed(2)} kWh</span></div>
    ${costoKwh?`<div class="ex-row"><span class="ex-key">Rimborso</span><span class="ex-val g">€ ${r}</span></div>`:''}
  </div>`;}
  return'';
}

function renderStepForm(key){
  if(key==='cruscotto')return`
    <div class="upload-area" id="up-cruscotto"><input type="file" accept="image/*" capture="environment" id="img-cruscotto"/>
    <div id="prev-cruscotto"><div class="upload-icon">🚗</div><div class="upload-text">Fotografa il cruscotto<br/>AI estrae km totali e km elettrico</div></div></div>
    <div id="load-cruscotto" style="display:none" class="loading"><div class="spinner"></div> Lettura...</div>
    <div class="form-grid"><div class="field"><label>KM Totali</label><input type="text" id="f-kmtot" placeholder="15420" inputmode="numeric"/></div>
    <div class="field"><label>KM Elettrico</label><input type="text" id="f-kmel" placeholder="42" inputmode="numeric"/></div></div>
    <div class="field" style="margin-bottom:12px"><label>Data</label><input type="date" id="f-data" value="${today()}"/></div>
    <button class="btn btn-o" onclick="saveCruscotto()">Conferma</button>`;

  if(key==='scontrino')return`
    <div class="upload-area" id="up-scontrino"><input type="file" accept="image/*" capture="environment" id="img-scontrino"/>
    <div id="prev-scontrino"><div class="upload-icon">⛽</div><div class="upload-text">Fotografa lo scontrino<br/>AI estrae litri e prezzo</div></div></div>
    <div id="load-scontrino" style="display:none" class="loading"><div class="spinner"></div> Lettura...</div>
    <div class="form-grid"><div class="field"><label>Litri</label><input type="text" id="f-litri" placeholder="38.5" inputmode="decimal"/></div>
    <div class="field"><label>€/Litro</label><input type="text" id="f-prezzo" placeholder="1.899" inputmode="decimal"/></div></div>
    <div class="field" style="margin-bottom:12px"><label>Stazione (opz.)</label><input type="text" id="f-stazione" placeholder="ENI Autostrada"/></div>
    <button class="btn btn-o" onclick="saveScontrino()">Conferma</button>`;

  if(key==='ricaricheCasa')return`
    <div class="upload-area" id="up-casa"><input type="file" accept="image/*" capture="environment" id="img-casa"/>
    <div id="prev-casa"><div class="upload-icon">🏠</div><div class="upload-text">Foto wallbox o app di ricarica<br/>AI legge i kWh totali</div></div></div>
    <div id="load-casa" style="display:none" class="loading"><div class="spinner g"></div> Lettura...</div>
    ${!costoKwh?`<div class="warn">⚠️ Imposta il €/kWh in alto per calcolare i costi</div>`:''}
    <div class="field" style="margin-bottom:12px"><label>kWh Totali a Casa</label><input type="text" class="green" id="f-kwh-casa" placeholder="28.4" inputmode="decimal"/></div>
    <button class="btn btn-o" onclick="saveRicaricheCasa()">Conferma</button>`;

  if(key==='ricaricheLavoro')return`
    <div class="upload-area green" id="up-lavoro"><input type="file" accept="image/*" capture="environment" id="img-lavoro"/>
    <div id="prev-lavoro"><div class="upload-icon">🏢</div><div class="upload-text">Foto wallbox o app aziendale<br/>AI legge i kWh totali</div></div></div>
    <div id="load-lavoro" style="display:none" class="loading"><div class="spinner g"></div> Lettura...</div>
    <div class="field" style="margin-bottom:12px"><label>kWh Totali al Lavoro</label><input type="text" class="green" id="f-kwh-lavoro" placeholder="15.2" inputmode="decimal"/></div>
    <button class="btn btn-g" onclick="saveRicaricheLavoro()">Conferma</button>`;
  return'';
}

function renderFinalSummary(){
  const c=cycle;
  const litri=num(c.scontrino?.litri), prezzoL=num(c.scontrino?.prezzoLitro);
  const costoBenz=litri*prezzoL;
  const kmTot=num(c.cruscotto?.kmTotali), kmEl=num(c.cruscotto?.kmElettrico);
  const kwhCasa=num(c.ricaricheCasa?.kwh), kwhLav=num(c.ricaricheLavoro?.kwh);
  const kwhTot=kwhCasa+kwhLav, cKwh=num(costoKwh);
  const costoEl=kwhTot*cKwh, rimborso=kwhLav*cKwh;
  const last=history[0]; const kmPrec=last?num(last.kmTotali):0;
  const kmPerc=kmPrec>0?kmTot-kmPrec:0, kmTerm=kmPerc>0?kmPerc-kmEl:0;
  const costPerKm=kmPerc>0?(costoBenz+costoEl)/kmPerc:0;

  return`<div class="summary-box">
    <div class="summary-title">📊 Riepilogo Ciclo</div>
    <div class="summary-grid">
      <div class="sum-item"><div class="sum-label">Benzina</div><div class="sum-val" style="color:var(--orange)">€ ${costoBenz.toFixed(2)}</div></div>
      <div class="sum-item"><div class="sum-label">Elettrico tot.</div><div class="sum-val" style="color:var(--blue)">€ ${costoEl.toFixed(2)}</div></div>
      ${kmPerc>0?`<div class="sum-item"><div class="sum-label">KM Percorsi</div><div class="sum-val">${kmPerc}<span class="sum-unit"> km</span></div></div>`:''}
      ${kmEl>0?`<div class="sum-item"><div class="sum-label">Di cui Elettrico</div><div class="sum-val" style="color:var(--green)">${kmEl}<span class="sum-unit"> km</span></div></div>`:''}
      ${costPerKm>0?`<div class="sum-item"><div class="sum-label">Costo/km</div><div class="sum-val">€ ${costPerKm.toFixed(3)}</div></div>`:''}
      ${litri>0&&kmTerm>0?`<div class="sum-item"><div class="sum-label">Consumo term.</div><div class="sum-val">${(kmTerm/litri).toFixed(1)}<span class="sum-unit"> km/L</span></div></div>`:''}
    </div>
  </div>
  ${rimborso>0?`<div class="rimborso-box">
    <div class="rimborso-label">💶 Rimborso da dare all'azienda</div>
    <div class="rimborso-amount">€ ${rimborso.toFixed(2)}</div>
    <div class="rimborso-detail">${kwhLav.toFixed(2)} kWh × € ${cKwh.toFixed(5)}/kWh</div>
  </div>`:''}
  <button class="btn btn-o" onclick="saveFinalCycle()" style="margin-bottom:8px">💾 Salva nel Registro</button>
  <button class="btn btn-ghost" onclick="resetCycle()">Annulla</button>`;
}

// ─── CICLO ACTIONS ────────────────────────────────────────────────────────────
function saveCruscotto(){
  const kmTotali=document.getElementById('f-kmtot')?.value.trim();
  if(!kmTotali){alert('Inserisci i KM totali');return;}
  cycle.cruscotto={kmTotali,kmElettrico:document.getElementById('f-kmel')?.value.trim()||'0',data:document.getElementById('f-data')?.value||today()};
  saveCycle();render();
}
function saveScontrino(){
  const litri=document.getElementById('f-litri')?.value.trim(),prezzoLitro=document.getElementById('f-prezzo')?.value.trim();
  if(!litri||!prezzoLitro){alert('Inserisci litri e prezzo/L');return;}
  cycle.scontrino={litri,prezzoLitro,stazione:document.getElementById('f-stazione')?.value.trim()};
  saveCycle();render();
}
function saveRicaricheCasa(){
  const kwh=document.getElementById('f-kwh-casa')?.value.trim();
  if(!kwh){alert('Inserisci i kWh');return;}
  cycle.ricaricheCasa={kwh}; saveCycle();render();
}
function saveRicaricheLavoro(){
  const kwh=document.getElementById('f-kwh-lavoro')?.value.trim();
  if(!kwh){alert('Inserisci i kWh');return;}
  cycle.ricaricheLavoro={kwh}; saveCycle();render();
}
function resetCycle(){
  if(!confirm('Azzerare il ciclo corrente?'))return;
  cycle={step:0,cruscotto:null,scontrino:null,ricaricheCasa:null,ricaricheLavoro:null};
  saveCycle();render();
}
function saveFinalCycle(){
  const c=cycle;
  const litri=num(c.scontrino?.litri),prezzoL=num(c.scontrino?.prezzoLitro);
  const kwhCasa=num(c.ricaricheCasa?.kwh),kwhLav=num(c.ricaricheLavoro?.kwh);
  const cKwh=num(costoKwh),kmTot=num(c.cruscotto?.kmTotali),kmEl=num(c.cruscotto?.kmElettrico);
  const last=history[0],kmPrec=last?num(last.kmTotali):0,kmPerc=kmPrec>0?kmTot-kmPrec:0;
  history.unshift({id:Date.now(),data:c.cruscotto?.data||today(),kmTotali:c.cruscotto?.kmTotali,kmElettrico:kmEl,kmPercorsi:kmPerc>0?kmPerc:null,litri:c.scontrino?.litri,prezzoLitro:c.scontrino?.prezzoLitro,stazione:c.scontrino?.stazione,costoBenzina:round2(litri*prezzoL),kwhCasa,kwhLavoro:kwhLav,costoKwhUsato:costoKwh,rimborso:round2(kwhLav*cKwh)});
  LS.set('rt_history_v2',history);
  cycle={step:0,cruscotto:null,scontrino:null,ricaricheCasa:null,ricaricheLavoro:null};
  saveCycle(); switchTab('storico');
}

// TAB RIMBORSO AZIENDALE
// ═══════════════════════════════════════════════════════════════════════════════
function renderRimborso(){
  const cKwh=num(costoKwh);
  const totKwh=ricaricheAzienda.reduce((s,r)=>s+num(r.kwh),0);
  const totImporto=totKwh*cKwh;
  const rounded=Math.ceil(totImporto);

  // Group by month
  const byMonth={};
  ricaricheAzienda.forEach(r=>{
    const key=r.data?r.data.substring(0,7):'?';
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(r);
  });

  let html='';

  // Bolletta riferimento
  if(bollettaRef){
    html+=`<div class="card active-green" style="margin-bottom:12px">
      <div class="card-title" style="color:var(--green)">🧾 Bolletta di riferimento</div>
      <div class="extracted">
        <div class="ex-row"><span class="ex-key">Numero</span><span style="font-size:12px">${esc(bollettaRef.numero||'—')}</span></div>
        <div class="ex-row"><span class="ex-key">Periodo</span><span style="font-size:12px">${esc(bollettaRef.periodo||'—')}</span></div>
        <div class="ex-row"><span class="ex-key">Consumo totale</span><span style="font-size:13px">${esc(bollettaRef.consumoTot||'—')} kWh</span></div>
        <div class="ex-row"><span class="ex-key">Coefficiente</span><span class="ex-val g">€ ${num(bollettaRef.coefficiente).toFixed(5)}/kWh</span></div>
      </div>
    </div>`;
  }

  // Rimborso totale
  if(ricaricheAzienda.length>0&&cKwh>0){
    html+=`<div class="rimborso-box">
      <div class="rimborso-label">💶 Totale da rimborsare all'azienda</div>
      <div class="rimborso-amount">€ ${totImporto.toFixed(2)}</div>
      <div class="rimborso-detail">${totKwh.toFixed(2)} kWh × € ${cKwh.toFixed(5)}/kWh</div>
      <div class="rimborso-rounded">Importo arrotondato consigliato: <strong>€ ${rounded},00</strong></div>
    </div>`;
  }

  // Azioni
  html+=`<div class="btn-row" style="margin-bottom:14px">
    <button class="btn btn-g btn-sm" onclick="openModal('ricarica-modal')">➕ Manuale</button>
    <button class="btn btn-ghost btn-sm" onclick="openFotoRicarica()">📸 Foto</button>
    ${ricaricheAzienda.length>0&&cKwh>0?`<button class="btn btn-ghost btn-sm" onclick="generaPDF()">⬇️ PDF</button>`:''}
  </div>`;

  // Upload foto ricarica aziendale
  html+=`<div id="foto-ricarica-area" style="display:none" class="card active-green">
    <div class="card-title" style="color:var(--green)">📸 Foto Ricarica Aziendale</div>
    <div class="upload-area green" id="up-ricarica-az"><input type="file" accept="image/*" capture="environment" id="img-ricarica-az"/>
    <div id="prev-ricarica-az"><div class="upload-icon">🏢</div><div class="upload-text">Fotografa il display della wallbox<br/>o la schermata dell'app</div></div></div>
    <div id="load-ricarica-az" style="display:none" class="loading"><div class="spinner g"></div> Lettura ricarica...</div>
    <div id="extracted-ricarica-az"></div>
  </div>`;

  // Lista per mese
  if(ricaricheAzienda.length===0){
    html+=`<div class="empty">Nessuna ricarica aziendale registrata.<br/>Aggiungi manualmente o fotografa il display.</div>`;
  } else {
    const months=Object.keys(byMonth).sort().reverse();
    months.forEach(m=>{
      const rows=byMonth[m];
      const mKwh=rows.reduce((s,r)=>s+num(r.kwh),0);
      const mImporto=mKwh*cKwh;
      const [y,mo]=m.split('-');
      const mLabel=new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
      html+=`<div class="section-label">${mLabel} — ${mKwh.toFixed(2)} kWh${cKwh>0?' · € '+mImporto.toFixed(2):''}</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px">`;
      rows.sort((a,b)=>a.data>b.data?1:-1).forEach(r=>{
        html+=`<div class="ricarica-row">
          <span class="ricarica-date">${fmtDate(r.data)}</span>
          <span class="ricarica-kwh">${num(r.kwh).toFixed(2)} kWh</span>
          ${r.note?`<span style="font-size:11px;color:var(--muted)">${esc(r.note)}</span>`:''}
          <span class="ricarica-importo">${cKwh>0?`<strong>€ ${round2(num(r.kwh)*cKwh).toFixed(2)}</strong>`:''}</span>
          <button class="del-btn" onclick="deleteRicarica(${r.id})">✕</button>
        </div>`;
      });
      html+=`</div>`;
    });
    if(ricaricheAzienda.length>0){
      html+=`<button class="btn btn-ghost" style="margin-top:4px" onclick="if(confirm('Svuotare tutte le ricariche?')){ricaricheAzienda=[];saveRicariche();render();}">🗑️ Svuota lista</button>`;
    }
  }
  return html;
}

function openFotoRicarica(){
  const area=document.getElementById('foto-ricarica-area');
  if(area) area.style.display=area.style.display==='none'?'block':'none';
}

function saveRicaricaManuale(){
  const kwh=document.getElementById('r-kwh')?.value.trim();
  if(!kwh){alert('Inserisci i kWh');return;}
  const data=document.getElementById('r-data')?.value||today();
  const note=document.getElementById('r-note')?.value.trim()||'';
  ricaricheAzienda.push({id:Date.now(),data,kwh,note});
  ricaricheAzienda.sort((a,b)=>b.data>a.data?1:-1);
  saveRicariche(); closeModal('ricarica-modal'); render();
}

function deleteRicarica(id){
  ricaricheAzienda=ricaricheAzienda.filter(r=>r.id!==id);
  saveRicariche(); render();
}

// ─── GENERA PDF ───────────────────────────────────────────────────────────────
function generaPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const cKwh=num(costoKwh);
  const W=210, ML=20, MR=190;

  // Group by month
  const byMonth={};
  ricaricheAzienda.forEach(r=>{
    const key=r.data?r.data.substring(0,7):'?';
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(r);
  });
  const months=Object.keys(byMonth).sort();

  // Period label
  const firstM=months[0]||''; const lastM=months[months.length-1]||'';
  function mLabel(m){const[y,mo]=m.split('-');return new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});}
  const periodoLabel=firstM===lastM?mLabel(firstM):`${mLabel(firstM)} - ${mLabel(lastM)}`;

  // ── HEADER ──
  doc.setFillColor(15,15,15);
  doc.rect(0,0,210,32,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(18); doc.setTextColor(249,115,22);
  doc.text('Riepilogo rimborso energia',ML,14);
  doc.setFontSize(9); doc.setTextColor(180,180,180);
  doc.text('Ricariche del mezzo aziendale effettuate presso la sede di lavoro',ML,20);
  doc.setFontSize(8);
  doc.text(`Documento generato il ${new Date().toLocaleDateString('it-IT')}`,ML,26);

  // ── INTRO ──
  let y=40;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  const introText='Documento riepilogativo predisposto ai fini del rimborso dell\'energia elettrica utilizzata per la ricarica del mezzo aziendale nel periodo '+periodoLabel+'. Il calcolo è stato effettuato considerando esclusivamente le componenti di costo proporzionali ai kWh effettivamente consumati. Sono state escluse le quote fisse e le quote potenza.';
  const lines=doc.splitTextToSize(introText,MR-ML);
  doc.text(lines,ML,y); y+=lines.length*4.5+6;

  // ── RIEPILOGO BOLLETTA ──
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(30,30,30);
  doc.text('Parametri bolletta di riferimento',ML,y); y+=5;

  const bRef=bollettaRef;
  const tableData=[
    ['Bolletta di riferimento', bRef?`N. ${bRef.numero||'—'} del ${bRef.data||'—'} - Bimestre ${bRef.periodo||periodoLabel}`:'—'],
    ['Consumo totale bolletta', bRef?(bRef.consumoTot+' kWh'):'—'],
    ['Totale bolletta', bRef?('EUR '+parseFloat(bRef.totaleFattura||0).toFixed(2)):'—'],
    ['Sconto soci', bRef?('EUR -'+parseFloat(bRef.scontoSoci||0).toFixed(2)):'—'],
    ['Coefficiente tecnico applicato', 'EUR '+cKwh.toFixed(5)+' per kWh'],
  ];

  doc.autoTable({startY:y,head:[],body:tableData,margin:{left:ML,right:20},
    columnStyles:{0:{cellWidth:80,fontStyle:'bold',fontSize:9,textColor:[60,60,60]},1:{fontSize:9,textColor:[30,30,30]}},
    styles:{cellPadding:2.5,lineColor:[220,220,220],lineWidth:0.2},
    alternateRowStyles:{fillColor:[248,248,248]},
  });
  y=doc.lastAutoTable.finalY+8;

  // ── PER MESE ──
  let totaleKwhBimestre=0, totaleImportoBimestre=0;
  const riepilogoMesi=[];

  months.forEach(m=>{
    const rows=byMonth[m].sort((a,b)=>a.data>b.data?1:-1);
    const mKwh=rows.reduce((s,r)=>s+num(r.kwh),0);
    const mImporto=round2(mKwh*cKwh);
    totaleKwhBimestre+=mKwh; totaleImportoBimestre+=mImporto;
    riepilogoMesi.push([mLabel(m), mKwh.toFixed(2)+' kWh', 'EUR '+mImporto.toFixed(2)]);

    // Check page space
    if(y>230){doc.addPage();y=20;}

    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(30,30,30);
    doc.text('Dettaglio ricariche - '+mLabel(m),ML,y); y+=5;

    const tableRows=rows.map(r=>[fmtDate(r.data), num(r.kwh).toFixed(2), r.note||'']);
    doc.autoTable({
      startY:y,
      head:[['Data','kWh','Note']],
      body:tableRows,
      foot:[['Totale mese',mKwh.toFixed(2)+' kWh','']],
      margin:{left:ML,right:20},
      headStyles:{fillColor:[249,115,22],textColor:[0,0,0],fontSize:9,fontStyle:'bold'},
      footStyles:{fillColor:[240,240,240],textColor:[30,30,30],fontSize:9,fontStyle:'bold'},
      bodyStyles:{fontSize:9},
      columnStyles:{0:{cellWidth:40},1:{cellWidth:30,halign:'center'},2:{cellWidth:100}},
      styles:{cellPadding:2.5},
    });
    y=doc.lastAutoTable.finalY+4;
    doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(100,100,100);
    doc.text(`Importo tecnico mese: EUR ${mImporto.toFixed(2)}`,ML,y); y+=10;
  });

  // ── RIEPILOGO FINALE ──
  if(y>220){doc.addPage();y=20;}
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(30,30,30);
  doc.text('Riepilogo finale',ML,y); y+=6;

  const finalRows=riepilogoMesi.map(r=>[r[0],r[1],r[2]]);
  finalRows.push(['Totale bimestre', round2(totaleKwhBimestre).toFixed(2)+' kWh', 'EUR '+round2(totaleImportoBimestre).toFixed(2)]);

  doc.autoTable({
    startY:y, head:[['Periodo','kWh','Importo']], body:finalRows.slice(0,-1), foot:[finalRows[finalRows.length-1]],
    margin:{left:ML,right:20},
    headStyles:{fillColor:[30,30,30],textColor:[249,115,22],fontSize:9,fontStyle:'bold'},
    footStyles:{fillColor:[249,115,22],textColor:[0,0,0],fontSize:10,fontStyle:'bold'},
    bodyStyles:{fontSize:9},
    styles:{cellPadding:3},
  });
  y=doc.lastAutoTable.finalY+8;

  // Importo arrotondato
  const rounded=Math.ceil(totaleImportoBimestre);
  doc.setFillColor(240,253,244); doc.setDrawColor(34,197,94);
  doc.roundedRect(ML,y,MR-ML,14,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(22,101,52);
  doc.text(`Importo arrotondato consigliato: EUR ${rounded},00`,ML+4,y+9);
  y+=20;

  // Nota se presente
  if(bRef?.nota){
    doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(100,100,100);
    const notaLines=doc.splitTextToSize('Nota: '+bRef.nota,MR-ML);
    doc.text(notaLines,ML,y); y+=notaLines.length*4+6;
  }

  // Firma
  if(y>260){doc.addPage();y=20;}
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text('Firma per presa visione ____________________________',ML,y+10);

  // Footer su ogni pagina
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text(`RangerTrack · Pagina ${i} di ${pageCount}`,W/2,290,{align:'center'});
  }

  const fn=`rimborso_${periodoLabel.replace(/\s/g,'_').toLowerCase()}.pdf`;
  doc.save(fn);
}

// TAB STORICO
// ═══════════════════════════════════════════════════════════════════════════════
function renderStorico(){
  if(!history.length)return`<div class="empty">Nessun ciclo salvato.<br/>Completa il primo ciclo nella tab Ciclo.</div>`;
  const totR=history.reduce((s,h)=>s+num(h.rimborso),0);
  const totB=history.reduce((s,h)=>s+num(h.costoBenzina),0);
  let html=`<div class="stats-bar">
    <div class="stat-mini"><div class="stat-mini-label">Cicli</div><div class="stat-mini-val">${history.length}</div></div>
    <div class="stat-mini"><div class="stat-mini-label">Tot. Benzina</div><div class="stat-mini-val" style="color:var(--orange)">€${totB.toFixed(0)}</div></div>
    <div class="stat-mini"><div class="stat-mini-label">Tot. Rimborso</div><div class="stat-mini-val" style="color:var(--green)">€${totR.toFixed(0)}</div></div>
  </div>`;
  history.forEach(h=>{
    html+=`<div class="history-item">
      <div class="history-date"><span>${fmtDate(h.data)}${h.stazione?' · '+esc(h.stazione):''}</span><button class="del-btn" onclick="delHistory(${h.id})">✕</button></div>
      <div class="history-grid">
        <div><div class="hs-label">Benzina</div><div class="hs-val" style="color:var(--orange)">€ ${num(h.costoBenzina).toFixed(2)}</div></div>
        <div><div class="hs-label">Litri</div><div class="hs-val">${num(h.litri).toFixed(1)} L</div></div>
        <div><div class="hs-label">€/L</div><div class="hs-val">${num(h.prezzoLitro).toFixed(3)}</div></div>
        ${h.kmPercorsi?`<div><div class="hs-label">KM perc.</div><div class="hs-val">${h.kmPercorsi}</div></div>`:''}
        ${num(h.kmElettrico)>0?`<div><div class="hs-label">KM elett.</div><div class="hs-val" style="color:var(--green)">${h.kmElettrico}</div></div>`:''}
        <div><div class="hs-label">kWh casa</div><div class="hs-val" style="color:var(--blue)">${num(h.kwhCasa).toFixed(1)}</div></div>
      </div>
      <div class="history-rimborso"><span>Rimborso az. (€${num(h.costoKwhUsato).toFixed(4)}/kWh)</span><strong>€ ${num(h.rimborso).toFixed(2)}</strong></div>
    </div>`;
  });
  return html;
}
function delHistory(id){ if(!confirm('Eliminare?'))return; history=history.filter(h=>h.id!==id); LS.set('rt_history_v2',history); render(); }

// TAB BOLLETTA
// ═══════════════════════════════════════════════════════════════════════════════
function renderBolletta(){
  return`<div class="card">
    <div class="card-title">🧾 Carica Bolletta Aziendale</div>
    <p class="info">Carica la bolletta ogni 2 mesi. L'AI estrae il coefficiente €/kWh calcolato su quota variabile (escluse quote fisse e potenza).</p>
    <div class="upload-area green" id="up-bolletta"><input type="file" accept="image/*,application/pdf" id="img-bolletta"/>
    <div id="prev-bolletta"><div class="upload-icon">📄</div><div class="upload-text">PDF o foto della bolletta<br/>Enel, A2A, Edison, Eni Gas e Luce…</div></div></div>
    <div id="load-bolletta" style="display:none" class="loading"><div class="spinner g"></div> Analisi bolletta in corso…</div>
    <div id="bolletta-result"></div>
  </div>
  ${costoKwh?`<div class="rimborso-box" style="border-color:var(--orange);background:rgba(249,115,22,0.08)">
    <div class="rimborso-label" style="color:var(--orange)">⚡ Coefficiente attuale</div>
    <div class="rimborso-amount" style="color:var(--orange);font-size:36px">€ ${num(costoKwh).toFixed(5)}</div>
    <div class="rimborso-detail">per kWh · usato per tutti i calcoli</div>
  </div>`:''}
  <div class="card" style="margin-top:4px">
    <div class="card-title" style="font-size:12px">📋 Dati bolletta per il PDF</div>
    <p class="info">Compila questi campi per renderli visibili nel report PDF scaricabile.</p>
    <div class="form-grid"><div class="field"><label>N. Bolletta</label><input type="text" id="b-numero" placeholder="844/PR" value="${esc(bollettaRef?.numero||'')}"/></div>
    <div class="field"><label>Data emissione</label><input type="date" id="b-data" value="${bollettaRef?.data||''}"/></div></div>
    <div class="form-grid three"><div class="field"><label>kWh Totali</label><input type="text" id="b-kwhtot" placeholder="1672" inputmode="decimal" value="${esc(bollettaRef?.consumoTot||'')}"/></div>
    <div class="field"><label>Totale € bolletta</label><input type="text" id="b-totale" placeholder="444.00" inputmode="decimal" value="${esc(bollettaRef?.totaleFattura||'')}"/></div>
    <div class="field"><label>Sconto soci €</label><input type="text" id="b-sconto" placeholder="78.95" inputmode="decimal" value="${esc(bollettaRef?.scontoSoci||'')}"/></div></div>
    <div class="field" style="margin-bottom:12px"><label>Periodo</label><input type="text" id="b-periodo" placeholder="marzo-aprile 2026" value="${esc(bollettaRef?.periodo||'')}"/></div>
    <div class="field" style="margin-bottom:12px"><label>Nota (opz.)</label><input type="text" id="b-nota" placeholder="es. ricarica del 30/04 inclusa…" value="${esc(bollettaRef?.nota||'')}"/></div>
    <button class="btn btn-g" onclick="saveBollettaRef()">Salva dati bolletta</button>
  </div>`;
}

function saveBollettaRef(){
  const totale=num(document.getElementById('b-totale')?.value);
  const sconto=num(document.getElementById('b-sconto')?.value);
  const kwhtot=num(document.getElementById('b-kwhtot')?.value);
  // Ricalcola coefficiente se possibile
  let coeff=costoKwh;
  if(totale>0&&kwhtot>0){
    coeff=round2((totale-sconto)/kwhtot*100000)/100000;
    costoKwh=String(coeff); LS.set('rt_kwh',costoKwh);
  }
  bollettaRef={
    numero:document.getElementById('b-numero')?.value.trim(),
    data:document.getElementById('b-data')?.value,
    consumoTot:document.getElementById('b-kwhtot')?.value.trim(),
    totaleFattura:document.getElementById('b-totale')?.value.trim(),
    scontoSoci:document.getElementById('b-sconto')?.value.trim(),
    periodo:document.getElementById('b-periodo')?.value.trim(),
    nota:document.getElementById('b-nota')?.value.trim(),
    coefficiente:coeff,
  };
  saveBolletta(); render();
  alert('Dati bolletta salvati! Coefficiente aggiornato: € '+coeff.toFixed(5)+'/kWh');
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents(){
  const map=[
    ['img-cruscotto',    extractCruscotto],
    ['img-scontrino',    extractScontrino],
    ['img-casa',         f=>extractRicariche(f,'casa')],
    ['img-lavoro',       f=>extractRicariche(f,'lavoro')],
    ['img-bolletta',     extractBollettaFile],
    ['img-ricarica-az',  extractRicaricaAz],
  ];
  map.forEach(([id,fn])=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('change',e=>{if(e.target.files[0])fn(e.target.files[0]);});
  });
  // Ricarica modale: imposta data di oggi
  const rData=document.getElementById('r-data');
  if(rData&&!rData.value) rData.value=today();
}

// ─── AI ──────────────────────────────────────────────────────────────────────
async function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

async function claudeVision(file,prompt,maxTok=400){
  const b64=await toB64(file);
  const isImg=file.type.startsWith('image/');
  const block=isImg?{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}}:{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}};
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:[block,{type:'text',text:prompt}]}]})});
  const data=await res.json();
  return data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'');
}

function showPreview(file,id){const el=document.getElementById(id);if(!el)return;el.innerHTML=file.type.startsWith('image/')?`<img src="${URL.createObjectURL(file)}" class="upload-preview"/>`:`<div style="color:var(--green);font-size:13px">📄 ${esc(file.name)}</div>`;}

async function extractCruscotto(file){
  showPreview(file,'prev-cruscotto');
  const l=document.getElementById('load-cruscotto');if(l)l.style.display='flex';
  try{const j=await claudeVision(file,'Cruscotto Ford Ranger PHEV. JSON puro:\n{"kmTotali":"","kmElettrico":""}\nkmTotali=odometro totale. kmElettrico=km percorsi in elettrico (range usato). Solo JSON.');
    const p=JSON.parse(j);
    if(p.kmTotali){const e=document.getElementById('f-kmtot');if(e)e.value=p.kmTotali;}
    if(p.kmElettrico){const e=document.getElementById('f-kmel');if(e)e.value=p.kmElettrico;}
  }catch(e){console.error(e);}
  if(l)l.style.display='none';
}

async function extractScontrino(file){
  showPreview(file,'prev-scontrino');
  const l=document.getElementById('load-scontrino');if(l)l.style.display='flex';
  try{const j=await claudeVision(file,'Scontrino rifornimento carburante. JSON puro:\n{"litri":"","prezzoLitro":"","stazione":""}\nSolo JSON.');
    const p=JSON.parse(j);
    if(p.litri){const e=document.getElementById('f-litri');if(e)e.value=p.litri;}
    if(p.prezzoLitro){const e=document.getElementById('f-prezzo');if(e)e.value=p.prezzoLitro;}
    if(p.stazione){const e=document.getElementById('f-stazione');if(e)e.value=p.stazione;}
  }catch(e){console.error(e);}
  if(l)l.style.display='none';
}

async function extractRicariche(file,tipo){
  const prevId=tipo==='casa'?'prev-casa':'prev-lavoro';
  const loadId=tipo==='casa'?'load-casa':'load-lavoro';
  const inputId=tipo==='casa'?'f-kwh-casa':'f-kwh-lavoro';
  showPreview(file,prevId);
  const l=document.getElementById(loadId);if(l)l.style.display='flex';
  try{const j=await claudeVision(file,'Display wallbox o app ricarica elettrica. JSON puro:\n{"kwhTotali":""}\nkwhTotali=somma totale kWh di tutte le sessioni visibili. Solo JSON.');
    const p=JSON.parse(j);
    if(p.kwhTotali){const e=document.getElementById(inputId);if(e)e.value=p.kwhTotali;}
  }catch(e){console.error(e);}
  if(l)l.style.display='none';
}

async function extractRicaricaAz(file){
  showPreview(file,'prev-ricarica-az');
  const l=document.getElementById('load-ricarica-az');if(l)l.style.display='flex';
  const result=document.getElementById('extracted-ricarica-az');
  try{const j=await claudeVision(file,'Display wallbox o app ricarica. Potrebbero esserci più sessioni. JSON puro:\n{"sessioni":[{"data":"YYYY-MM-DD","kwh":""}]}\nSe una sola sessione, array con un elemento. Data di oggi se non visibile: '+today()+'. Solo JSON.',600);
    const p=JSON.parse(j);
    const sessioni=p.sessioni||[];
    sessioni.forEach(s=>{if(s.kwh)ricaricheAzienda.push({id:Date.now()+Math.random(),data:s.data||today(),kwh:s.kwh,note:''});});
    ricaricheAzienda.sort((a,b)=>b.data>a.data?1:-1);
    saveRicariche();
    if(result)result.innerHTML=`<div style="color:var(--green);font-size:13px;padding:8px 0">✓ ${sessioni.length} ricarica/e aggiunte</div>`;
    setTimeout(()=>render(),1200);
  }catch(e){if(result)result.innerHTML=`<div style="color:var(--red);font-size:12px">Errore. Inserisci manualmente.</div>`;}
  if(l)l.style.display='none';
}

async function extractBollettaFile(file){
  showPreview(file,'prev-bolletta');
  const l=document.getElementById('load-bolletta');if(l)l.style.display='flex';
  const result=document.getElementById('bolletta-result');
  try{const j=await claudeVision(file,'Bolletta elettrica italiana. JSON puro:\n{"costoKwh":"","totaleKwh":"","totaleFattura":"","scontoSoci":"","periodo":"","fornitore":"","numeroBolletta":""}\ncostoKwh=(totaleFattura-scontoSoci)/totaleKwh escludendo quote fisse. Solo JSON.',500);
    const p=JSON.parse(j);
    if(p.costoKwh){costoKwh=p.costoKwh;LS.set('rt_kwh',costoKwh);updateKwhPill();}
    // Pre-fill form
    if(p.numeroBolletta){const e=document.getElementById('b-numero');if(e)e.value=p.numeroBolletta;}
    if(p.totaleKwh){const e=document.getElementById('b-kwhtot');if(e)e.value=p.totaleKwh;}
    if(p.totaleFattura){const e=document.getElementById('b-totale');if(e)e.value=p.totaleFattura;}
    if(p.scontoSoci){const e=document.getElementById('b-sconto');if(e)e.value=p.scontoSoci;}
    if(p.periodo){const e=document.getElementById('b-periodo');if(e)e.value=p.periodo;}
    if(result)result.innerHTML=`<div class="extracted" style="margin-top:10px">
      ${p.fornitore?`<div class="ex-row"><span class="ex-key">Fornitore</span><span style="font-size:12px">${esc(p.fornitore)}</span></div>`:''}
      ${p.periodo?`<div class="ex-row"><span class="ex-key">Periodo</span><span style="font-size:12px">${esc(p.periodo)}</span></div>`:''}
      ${p.totaleKwh?`<div class="ex-row"><span class="ex-key">kWh fatturati</span><span style="font-size:13px">${esc(p.totaleKwh)} kWh</span></div>`:''}
      ${p.totaleFattura?`<div class="ex-row"><span class="ex-key">Totale fattura</span><span style="font-size:13px">€ ${esc(p.totaleFattura)}</span></div>`:''}
      ${p.scontoSoci?`<div class="ex-row"><span class="ex-key">Sconto soci</span><span style="font-size:13px">€ -${esc(p.scontoSoci)}</span></div>`:''}
      <div class="ex-row"><span class="ex-key">Coefficiente €/kWh</span><span class="ex-val g">€ ${num(p.costoKwh).toFixed(5)}</span></div>
    </div>
    <div style="margin-top:10px;padding:10px;background:rgba(34,197,94,0.08);border:1px solid var(--green);border-radius:6px;font-size:12px;color:var(--green)">
      ✓ Coefficiente aggiornato. Compila i campi sotto e premi "Salva" per completare.
    </div>`;
  }catch(e){if(result)result.innerHTML=`<div style="color:var(--red);font-size:12px;margin-top:8px">Errore lettura. Inserisci i dati manualmente.</div>`;}
  if(l)l.style.display='none';
}
