<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RangerTrack" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>RangerTrack</title>

  <!-- PWA Icons inline (SVG data URIs) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f0f0f'/><text y='.9em' font-size='80' x='10'>⛽</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --orange-dim: rgba(249,115,22,0.12);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --muted: #666;
      --text: #e0e0d8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      background: var(--bg2);
      border-bottom: 2px solid var(--orange);
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 26px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-logo span { color: var(--orange); }
    .header-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 13px 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active-fuel  { color: var(--orange); border-bottom-color: var(--orange); }
    .tab.active-elec  { color: var(--green);  border-bottom-color: var(--green); }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 16px calc(var(--safe-bottom) + 18px);
    }

    /* ── STAT GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-unit { font-size: 12px; font-weight: 400; color: var(--muted); margin-left: 3px; }
    .c-fuel { color: var(--orange); }
    .c-elec { color: var(--green); }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 2px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .badge-fuel { background: var(--orange); color: #000; }
    .badge-elec { background: var(--green);  color: #000; }

    /* ── UPLOAD ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 12px;
      position: relative;
    }
    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-area:hover, .upload-area:active { border-color: var(--orange); background: var(--orange-dim); }
    .upload-area.elec:hover, .upload-area.elec:active { border-color: var(--green); background: var(--green-dim); }
    .upload-icon { font-size: 26px; margin-bottom: 4px; }
    .upload-text { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .upload-preview { max-height: 100px; max-width: 100%; border-radius: 4px; }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 10px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input:focus { border-color: var(--orange); }
    .field input.elec:focus { border-color: var(--green); }
    .field input[type=date] { color-scheme: dark; }

    /* ── BUTTONS ── */
    .btn {
      padding: 12px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }
    .btn-fuel { background: var(--orange); color: #000; }
    .btn-elec { background: var(--green);  color: #000; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      font-size: 11px;
    }
    .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .calc-preview { font-size: 13px; color: var(--muted); }
    .calc-preview strong { color: var(--orange); }
    .calc-preview strong.g { color: var(--green); }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: 13px; margin-top: 10px;
    }
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.g { border-top-color: var(--green); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AI RESPONSE ── */
    .ai-response {
      background: var(--bg3);
      border-radius: 4px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #bbb;
      white-space: pre-wrap;
      margin-top: 12px;
    }

    /* ── RIMBORSO BOX ── */
    .rimborso-box {
      background: var(--green-dim);
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .rimborso-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--green); margin-bottom: 6px;
    }
    .rimborso-amount {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 52px; font-weight: 900; color: var(--green); line-height: 1;
    }
    .rimborso-detail { font-size: 12px; color: #888; margin-top: 4px; }

    /* ── LOG TABLE ── */
    .log-list { display: flex; flex-direction: column; gap: 0; }
    .log-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .log-item:first-child { border-radius: 6px 6px 0 0; }
    .log-item:last-child  { border-bottom: none; border-radius: 0 0 6px 6px; }
    .log-main { flex: 1; min-width: 0; }
    .log-top { display: flex; gap: 8px; align-items: baseline; }
    .log-value { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; }
    .log-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .log-total { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .log-del {
      background: transparent; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; padding: 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .log-del:active { color: #e53e3e; }

    .section-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; margin-top: 4px;
    }

    .empty {
      text-align: center; padding: 36px 20px;
      color: var(--muted); font-size: 13px; line-height: 1.6;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px;
    }

    /* ── BILL DATA ── */
    .bill-data {
      background: var(--bg3); border-radius: 4px; padding: 12px;
      margin-top: 10px; font-size: 12px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .bill-data span { color: var(--muted); }
    .bill-data strong.g { color: var(--green); }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      position: fixed; bottom: calc(var(--safe-bottom) + 12px); left: 50%;
      transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--orange);
      border-radius: 8px; padding: 12px 18px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 999; width: calc(100% - 32px); max-width: 400px;
      text-align: center;
    }
    #install-banner.show { display: block; }
    #install-banner strong { color: var(--orange); }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-logo">RANGER<span>TRACK</span></div>
    <div class="header-sub">Ford Ranger · Carburante &amp; Energia</div>
  </div>
  <div class="tabs">
    <button class="tab active-fuel" id="tab-fuel" onclick="switchTab('fuel')">⛽ Rifornimenti</button>
    <button class="tab" id="tab-elec" onclick="switchTab('elec')">⚡ Ricariche</button>
  </div>
  <div class="scroll-area" id="main-content"></div>
</div>

<div id="install-banner">
  📲 Aggiungi <strong>RangerTrack</strong> alla home screen:<br/>
  Safari → <strong>Condividi</strong> → <strong>"Aggiungi a Home"</strong>
  <br/><button class="btn btn-ghost" style="margin-top:8px" onclick="document.getElementById('install-banner').classList.remove('show')">Chiudi</button>
</div>

<script>
// ─── STORAGE ──────────────────────────────────────────────────────────────────
const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : []; } catch { return []; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
const FUEL_KEY = 'rt_fuel_v1';
const ELEC_KEY = 'rt_elec_v1';

let currentTab = 'fuel';
let fuelLogs = LS.get(FUEL_KEY);
let elecLogs = LS.get(ELEC_KEY);

// State for electric
let elecCostoKwh = '';
let billDataCache = null;

function num(v) { return parseFloat(String(v || '').replace(',', '.')) || 0; }
function fmtDate(d) { if (!d) return '—'; return new Date(d + 'T12:00:00').toLocaleDateString('it-IT'); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── TAB SWITCH ───────────────────────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-fuel').className = 'tab' + (t==='fuel' ? ' active-fuel' : '');
  document.getElementById('tab-elec').className = 'tab' + (t==='elec' ? ' active-elec' : '');
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  el.innerHTML = currentTab === 'fuel' ? renderFuel() : renderElec();
  attachEvents();
}

// ─── FUEL RENDER ──────────────────────────────────────────────────────────────
function renderFuel() {
  const stats = calcFuelStats();
  return `
    ${stats ? `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Rifornimenti</div><div class="stat-value c-fuel">${stats.count}</div></div>
      <div class="stat-card"><div class="stat-label">Spesa Totale</div><div class="stat-value c-fuel">${stats.totSpesa.toFixed(2)}<span class="stat-unit">€</span></div></div>
      <div class="stat-card"><div class="stat-label">Litri Totali</div><div class="stat-value c-fuel">${stats.totLitri.toFixed(1)}<span class="stat-unit">L</span></div></div>
      <div class="stat-card"><div class="stat-label">Prezzo Medio</div><div class="stat-value c-fuel">${stats.avgPL.toFixed(3)}<span class="stat-unit">€/L</span></div></div>
      ${stats.kmL ? `<div class="stat-card" style="grid-column:1/-1"><div class="stat-label">Consumo Medio</div><div class="stat-value c-fuel">${stats.kmL.toFixed(1)}<span class="stat-unit">km/L</span></div></div>` : ''}
    </div>` : ''}

    <div class="card">
      <div class="card-title">📸 Carica Scontrino <span class="badge badge-fuel">AI</span></div>
      <div class="upload-area" id="fuel-upload-area">
        <input type="file" accept="image/*" capture="environment" id="fuel-img-input" />
        <div id="fuel-upload-inner">
          <div class="upload-icon">⛽</div>
          <div class="upload-text">Tocca per fotografare lo scontrino<br/>L'AI compila i campi automaticamente</div>
        </div>
      </div>
      <div id="fuel-extract-loading" style="display:none" class="loading"><div class="spinner"></div> Lettura scontrino...</div>
    </div>

    <div class="card">
      <div class="card-title">➕ Inserisci Rifornimento</div>
      <div class="form-grid">
        <div class="field"><label>Data</label><input type="date" id="f-data" /></div>
        <div class="field"><label>Litri</label><input type="text" id="f-litri" placeholder="45.2" inputmode="decimal" /></div>
        <div class="field"><label>€/Litro</label><input type="text" id="f-prezzo" placeholder="1.899" inputmode="decimal" /></div>
        <div class="field"><label>KM Attuali</label><input type="text" id="f-km" placeholder="12540" inputmode="numeric" /></div>
      </div>
      <div class="field" style="margin-bottom:14px"><label>Stazione</label><input type="text" id="f-stazione" placeholder="es. ENI Autostrada" /></div>
      <div class="btn-row">
        <button class="btn btn-fuel" onclick="addFuel()">Aggiungi</button>
        <span class="calc-preview" id="fuel-calc"></span>
      </div>
    </div>

    ${fuelLogs.length > 0 ? `
    <div class="card">
      <div class="card-title">🤖 Analisi AI <span class="badge badge-fuel">CLAUDE</span></div>
      <button class="btn btn-fuel" onclick="analyzeFuel()">Analizza i miei rifornimenti</button>
      <div id="fuel-ai-loading" style="display:none" class="loading"><div class="spinner"></div> Claude sta elaborando...</div>
      <div id="fuel-ai-response" class="ai-response" style="display:none"></div>
    </div>` : ''}

    <div class="section-label">Storico Rifornimenti</div>
    ${fuelLogs.length === 0
      ? '<div class="empty">Nessun rifornimento ancora.<br/>Carica uno scontrino o inserisci i dati.</div>'
      : `<div class="log-list">${fuelLogs.map(l => `
        <div class="log-item">
          <div class="log-main">
            <div class="log-top">
              <span class="log-value c-fuel">${num(l.litri).toFixed(1)} L</span>
              <span style="font-size:12px;color:var(--muted)">${num(l.prezzoLitro).toFixed(3)} €/L</span>
            </div>
            <div class="log-sub">${fmtDate(l.data)}${l.stazione ? ' · ' + esc(l.stazione) : ''}${l.km ? ' · km ' + esc(l.km) : ''}</div>
          </div>
          <div class="log-total">€ ${(num(l.litri)*num(l.prezzoLitro)).toFixed(2)}</div>
          <button class="log-del" onclick="delFuel(${l.id})">✕</button>
        </div>`).join('')}</div>`}
  `;
}

// ─── ELEC RENDER ──────────────────────────────────────────────────────────────
function renderElec() {
  const totKwh = elecLogs.reduce((s,l) => s + num(l.kwh), 0);
  const costo = num(elecCostoKwh);
  const rimborso = totKwh * costo;
  const bd = billDataCache;

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Ricariche</div><div class="stat-value c-elec">${elecLogs.length}</div></div>
      <div class="stat-card"><div class="stat-label">Totale kWh</div><div class="stat-value c-elec">${totKwh.toFixed(2)}<span class="stat-unit">kWh</span></div></div>
      <div class="stat-card"><div class="stat-label">€/kWh</div><div class="stat-value c-elec">${costo ? costo.toFixed(4) : '—'}</div></div>
      <div class="stat-card"><div class="stat-label">Da Rimborsare</div><div class="stat-value c-elec">${costo ? rimborso.toFixed(2) : '—'}<span class="stat-unit">€</span></div></div>
    </div>

    ${rimborso > 0 ? `
    <div class="rimborso-box">
      <div class="rimborso-label">💶 Rimborso da corrispondere all'azienda</div>
      <div class="rimborso-amount">€ ${rimborso.toFixed(2)}</div>
      <div class="rimborso-detail">${totKwh.toFixed(2)} kWh × € ${costo.toFixed(4)}/kWh</div>
    </div>` : ''}

    <div class="card">
      <div class="card-title">📄 Bolletta Aziendale <span class="badge badge-elec">AI</span></div>
      <div class="upload-area elec" id="elec-upload-area">
        <input type="file" accept="image/*,application/pdf" id="elec-bill-input" />
        <div id="elec-upload-inner">
          <div class="upload-icon">🧾</div>
          <div class="upload-text">Carica bolletta PDF o foto<br/>L'AI estrae il costo €/kWh</div>
        </div>
      </div>
      <div id="elec-bill-loading" style="display:none" class="loading"><div class="spinner g"></div> Analisi bolletta...</div>
      ${bd ? `<div class="bill-data">
        <div><span>Fornitore: </span>${esc(bd.fornitore||'—')}</div>
        <div><span>Periodo: </span>${esc(bd.periodo||'—')}</div>
        <div><span>Totale: </span>${bd.totaleFattura ? '€ '+esc(bd.totaleFattura) : '—'}</div>
        <div><span>kWh: </span>${esc(bd.totaleKwh||'—')}</div>
        <div style="grid-column:1/-1"><span>€/kWh estratto: </span><strong class="g">${esc(bd.costoKwh||'—')}</strong></div>
      </div>` : ''}
      <div class="field" style="margin-top:12px;max-width:220px">
        <label>€/kWh (da bolletta o manuale)</label>
        <input type="text" class="elec" id="elec-costo" placeholder="0.2450" inputmode="decimal" value="${esc(elecCostoKwh)}" />
      </div>
    </div>

    <div class="card">
      <div class="card-title">➕ Inserisci Ricarica</div>
      <div class="form-grid three">
        <div class="field"><label>Data</label><input type="date" id="e-data" /></div>
        <div class="field"><label>kWh</label><input type="text" class="elec" id="e-kwh" placeholder="25.4" inputmode="decimal" /></div>
        <div class="field"><label>Note</label><input type="text" id="e-note" placeholder="notturna" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-elec" onclick="addElec()">Aggiungi</button>
        <span class="calc-preview" id="elec-calc"></span>
      </div>
    </div>

    ${elecLogs.length > 0 ? `
    <div class="card">
      <div class="card-title">🤖 Riepilogo AI <span class="badge badge-elec">CLAUDE</span></div>
      <button class="btn btn-elec" onclick="analyzeElec()">Genera riepilogo rimborso</button>
      <div id="elec-ai-loading" style="display:none" class="loading"><div class="spinner g"></div> Claude sta elaborando...</div>
      <div id="elec-ai-response" class="ai-response" style="display:none"></div>
    </div>` : ''}

    <div class="section-label">Storico Ricariche</div>
    ${elecLogs.length === 0
      ? '<div class="empty">Nessuna ricarica registrata.<br/>Inserisci i kWh di ogni ricarica in azienda.</div>'
      : `<div class="log-list">${elecLogs.map(l => `
        <div class="log-item">
          <div class="log-main">
            <div class="log-top"><span class="log-value c-elec">${num(l.kwh).toFixed(2)} kWh</span></div>
            <div class="log-sub">${fmtDate(l.data)}${l.note ? ' · '+esc(l.note):''}</div>
          </div>
          <div class="log-total">${costo ? '€ '+(num(l.kwh)*costo).toFixed(2) : '—'}</div>
          <button class="log-del" onclick="delElec(${l.id})">✕</button>
        </div>`).join('')}</div>`}
  `;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents() {
  if (currentTab === 'fuel') {
    const img = document.getElementById('fuel-img-input');
    if (img) img.addEventListener('change', e => { if(e.target.files[0]) extractFuelImage(e.target.files[0]); });

    const li = document.getElementById('f-litri');
    const pr = document.getElementById('f-prezzo');
    if (li && pr) {
      [li, pr].forEach(el => el.addEventListener('input', updateFuelCalc));
    }
  } else {
    const bill = document.getElementById('elec-bill-input');
    if (bill) bill.addEventListener('change', e => { if(e.target.files[0]) extractBill(e.target.files[0]); });

    const costo = document.getElementById('elec-costo');
    if (costo) costo.addEventListener('input', e => {
      elecCostoKwh = e.target.value;
      updateElecCalc();
      // update stats live
      const stats = document.querySelectorAll('.stat-card');
      // just re-render for simplicity
    });

    const kwhIn = document.getElementById('e-kwh');
    if (kwhIn) kwhIn.addEventListener('input', updateElecCalc);
  }
}

function updateFuelCalc() {
  const l = num(document.getElementById('f-litri')?.value);
  const p = num(document.getElementById('f-prezzo')?.value);
  const el = document.getElementById('fuel-calc');
  if (el && l && p) el.innerHTML = `Totale: <strong>€ ${(l*p).toFixed(2)}</strong>`;
  else if (el) el.innerHTML = '';
}

function updateElecCalc() {
  const k = num(document.getElementById('e-kwh')?.value);
  const c = num(document.getElementById('elec-costo')?.value || elecCostoKwh);
  const el = document.getElementById('elec-calc');
  if (el && k && c) el.innerHTML = `Quota: <strong class="g">€ ${(k*c).toFixed(2)}</strong>`;
  else if (el) el.innerHTML = '';
}

// ─── FUEL ACTIONS ─────────────────────────────────────────────────────────────
function addFuel() {
  const litri   = document.getElementById('f-litri')?.value.trim();
  const prezzo  = document.getElementById('f-prezzo')?.value.trim();
  if (!litri || !prezzo) { alert('Inserisci almeno litri e prezzo/L'); return; }
  fuelLogs.unshift({
    id: Date.now(),
    data:      document.getElementById('f-data')?.value || '',
    litri, prezzoLitro: prezzo,
    km:        document.getElementById('f-km')?.value.trim() || '',
    stazione:  document.getElementById('f-stazione')?.value.trim() || ''
  });
  LS.set(FUEL_KEY, fuelLogs);
  render();
}

function delFuel(id) {
  fuelLogs = fuelLogs.filter(l => l.id !== id);
  LS.set(FUEL_KEY, fuelLogs);
  render();
}

async function extractFuelImage(file) {
  const loadEl = document.getElementById('fuel-extract-loading');
  if (loadEl) loadEl.style.display = 'flex';
  try {
    const b64 = await toBase64(file);
    const res = await claudeAPI([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: b64 } },
        { type: 'text', text: 'Estrai dati da questo scontrino benzina. Rispondi SOLO con JSON puro:\n{"litri":"","prezzoLitro":"","data":"YYYY-MM-DD","stazione":""}\nSe un campo non è visibile usa "". Solo JSON.' }
      ]
    }], 400);
    const parsed = JSON.parse(res);
    if (parsed.litri)      { const el = document.getElementById('f-litri');    if(el) el.value = parsed.litri; }
    if (parsed.prezzoLitro){ const el = document.getElementById('f-prezzo');   if(el) el.value = parsed.prezzoLitro; }
    if (parsed.data)       { const el = document.getElementById('f-data');     if(el) el.value = parsed.data; }
    if (parsed.stazione)   { const el = document.getElementById('f-stazione'); if(el) el.value = parsed.stazione; }
    updateFuelCalc();
    // Show preview
    const inner = document.getElementById('fuel-upload-inner');
    if (inner) inner.innerHTML = `<img src="${URL.createObjectURL(file)}" class="upload-preview" />`;
  } catch(e) { console.error(e); }
  if (loadEl) loadEl.style.display = 'none';
}

async function analyzeFuel() {
  const loadEl = document.getElementById('fuel-ai-loading');
  const respEl = document.getElementById('fuel-ai-response');
  if (loadEl) loadEl.style.display = 'flex';
  if (respEl) respEl.style.display = 'none';
  try {
    const text = await claudeAPI([{
      role: 'user',
      content: `Sei un assistente per la gestione carburante Ford Ranger. Analizza questi rifornimenti e dai un'analisi utile in italiano (consumo medio, trend spesa, consigli):\n${JSON.stringify(fuelLogs, null, 2)}`
    }], 1000);
    if (respEl) { respEl.textContent = text; respEl.style.display = 'block'; }
  } catch { if (respEl) { respEl.textContent = 'Errore di connessione.'; respEl.style.display = 'block'; } }
  if (loadEl) loadEl.style.display = 'none';
}

// ─── ELEC ACTIONS ─────────────────────────────────────────────────────────────
function addElec() {
  const kwh = document.getElementById('e-kwh')?.value.trim();
  if (!kwh) { alert('Inserisci i kWh'); return; }
  elecLogs.unshift({
    id: Date.now(),
    data: document.getElementById('e-data')?.value || '',
    kwh,
    note: document.getElementById('e-note')?.value.trim() || ''
  });
  LS.set(ELEC_KEY, elecLogs);
  render();
}

function delElec(id) {
  elecLogs = elecLogs.filter(l => l.id !== id);
  LS.set(ELEC_KEY, elecLogs);
  render();
}

async function extractBill(file) {
  const loadEl = document.getElementById('elec-bill-loading');
  if (loadEl) loadEl.style.display = 'flex';
  try {
    const b64 = await toBase64(file);
    const isImg = file.type.startsWith('image/');
    const block = isImg
      ? { type: 'image',    source: { type: 'base64', media_type: file.type, data: b64 } }
      : { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } };

    const res = await claudeAPI([{
      role: 'user',
      content: [
        block,
        { type: 'text', text: 'Analizza questa bolletta elettrica italiana. Rispondi SOLO con JSON puro:\n{"costoKwh":"","totaleKwh":"","totaleFattura":"","periodo":"","fornitore":""}\ncostoKwh = costo medio per kWh. Solo JSON.' }
      ]
    }], 400);
    const parsed = JSON.parse(res);
    billDataCache = parsed;
    if (parsed.costoKwh) elecCostoKwh = parsed.costoKwh;
  } catch(e) { console.error(e); billDataCache = { error: true }; }
  if (loadEl) loadEl.style.display = 'none';
  render();
}

async function analyzeElec() {
  const loadEl = document.getElementById('elec-ai-loading');
  const respEl = document.getElementById('elec-ai-response');
  if (loadEl) loadEl.style.display = 'flex';
  if (respEl) respEl.style.display = 'none';
  const totKwh = elecLogs.reduce((s,l) => s + num(l.kwh), 0);
  const costo = num(elecCostoKwh);
  try {
    const text = await claudeAPI([{
      role: 'user',
      content: `Calcola rimborso ricariche auto elettrica in azienda. Dati:\nRicariche: ${JSON.stringify(elecLogs)}\nCosto kWh: ${costo} €\nTotale kWh: ${totKwh.toFixed(2)}\nRimborso: ${(totKwh*costo).toFixed(2)} €\nFai un riepilogo chiaro in italiano con dettaglio e conferma importo.`
    }], 800);
    if (respEl) { respEl.textContent = text; respEl.style.display = 'block'; }
  } catch { if (respEl) { respEl.textContent = 'Errore di connessione.'; respEl.style.display = 'block'; } }
  if (loadEl) loadEl.style.display = 'none';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function claudeAPI(messages, maxTokens = 1000) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages
    })
  });
  const data = await response.json();
  const text = data.content?.map(b => b.text || '').join('').trim().replace(/```json|```/g, '');
  return text;
}

// ─── PWA INSTALL BANNER ───────────────────────────────────────────────────────
function checkInstallPrompt() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.navigator.standalone === true;
  const shown = localStorage.getItem('rt_install_shown');
  if (isIOS && !isInStandalone && !shown) {
    setTimeout(() => {
      document.getElementById('install-banner').classList.add('show');
      localStorage.setItem('rt_install_shown', '1');
    }, 3000);
  }
}

// ─── CALC FUEL STATS ─────────────────────────────────────────────────────────
function calcFuelStats() {
  if (!fuelLogs.length) return null;
  const totSpesa = fuelLogs.reduce((s,l) => s + num(l.litri)*num(l.prezzoLitro), 0);
  const totLitri = fuelLogs.reduce((s,l) => s + num(l.litri), 0);
  const kms = fuelLogs.map(l => num(l.km)).filter(Boolean);
  const kmL = kms.length >= 2 ? (Math.max(...kms) - Math.min(...kms)) / totLitri : null;
  return { count: fuelLogs.length, totSpesa, totLitri, avgPL: totSpesa / totLitri, kmL };
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
checkInstallPrompt();
</script>
