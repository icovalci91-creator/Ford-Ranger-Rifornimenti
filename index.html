<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RangerTrack"/>
<meta name="theme-color" content="#0f0f0f"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --o:#f97316;--g:#22c55e;--b:#3b82f6;--r:#ef4444;
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--bd:#2a2a2a;
  --mu:#555;--tx:#deded6;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:700px;margin:0 auto}

/* HEADER */
.hdr{padding:60px 16px 12px;background:var(--bg2);border-bottom:2px solid var(--o);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}

.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:3px;text-transform:uppercase}
.logo span{color:var(--o)}
.logo-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);margin-top:1px}
.pill{font-size:11px;background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 10px;color:var(--mu);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.pill.on{border-color:var(--g);color:var(--g)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.tab{flex:1;padding:12px 4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--mu);border-bottom:3px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tab.to{color:var(--o);border-bottom-color:var(--o)}
.tab.tg{color:var(--g);border-bottom-color:var(--g)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px calc(var(--sb)+20px)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:12px}
.card.co{border-color:var(--o)}
.card.cg{border-color:var(--g)}
.card.cf{opacity:.55}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ck{margin-left:auto;color:var(--g)}

/* DOTS */
.wiz{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.dots{display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:background .2s}
.dot.dn{background:var(--o)}
.dot.ac{background:var(--o);box-shadow:0 0 0 3px rgba(249,115,22,.25)}
.wlbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mu)}

/* UPLOAD */
.up{border:2px dashed var(--bd);border-radius:6px;padding:18px;text-align:center;cursor:pointer;position:relative;transition:all .2s;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
.up input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.up:active,.up:hover{border-color:var(--o);background:rgba(249,115,22,.05)}
.up.ug:active,.up.ug:hover{border-color:var(--g);background:rgba(34,197,94,.05)}
.uico{font-size:26px;margin-bottom:4px}
.utxt{font-size:12px;color:var(--mu);line-height:1.5}
.uprev{max-height:80px;max-width:100%;border-radius:4px}

/* EXTRACTED */
.ex{background:var(--bg3);border-radius:6px;padding:12px;margin-bottom:10px}
.exr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd)}
.exr:last-child{border-bottom:none}
.exk{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mu)}
.exv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--o)}
.exv.g{color:var(--g)}.exv.b{color:var(--b)}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu)}
.fl input{background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:10px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s}
.fl input:focus{border-color:var(--o)}
.fl input.ig:focus{border-color:var(--g)}
.fl input[type=date]{color-scheme:dark}

/* BUTTONS */
.btn{padding:13px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;width:100%;display:block}
.btn:active{opacity:.7}
.bo{background:var(--o);color:#000}
.bg{background:var(--g);color:#000}
.bgh{background:var(--bg3);border:1px solid var(--bd);color:var(--mu)}
.bsm{padding:8px 14px;font-size:11px;width:auto;display:inline-block}
.brow{display:flex;gap:8px;flex-wrap:wrap}

/* LOADING */
.ld{display:flex;align-items:center;gap:8px;color:var(--mu);font-size:12px;padding:6px 0}
.sp{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--o);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.sp.sg{border-top-color:var(--g)}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATS */
.sg4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:16px}
.slbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:var(--g);line-height:1}
.ssub{font-size:10px;color:var(--mu);margin-top:4px}

/* RIMBORSO BOX */
.rbox{background:rgba(34,197,94,.08);border:1px solid var(--g);border-radius:8px;padding:16px;margin-bottom:12px}
.rlbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:4px}
.ramt{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--g);line-height:1}
.rdet{font-size:11px;color:var(--mu);margin-top:4px}
.rrnd{font-size:13px;color:var(--g);margin-top:6px}

/* RICARICA ROW */
.rcrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd);background:var(--bg2);font-size:14px}
.rcrow:first-child{border-radius:6px 6px 0 0}
.rcrow:last-child{border-bottom:none;border-radius:0 0 6px 6px}
.rcdt{color:var(--mu);font-size:12px;min-width:80px}
.rckw{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--g);flex:1}
.rcimp{font-size:13px;color:var(--mu)}
.rcimp strong{color:var(--tx)}

/* HISTORY */
.hi{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px}
.hidate{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.hig4{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.hib{border-radius:6px;padding:8px 10px}
.hibl{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.hibv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;line-height:1}
.hibsub{font-size:10px;color:var(--mu);margin-top:2px}

/* BIMESTRE ARCHIVE */
.bcard{background:var(--bg2);border-radius:8px;margin-bottom:10px;overflow:hidden}
.bcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:14px;cursor:pointer}
.bcard-detail{border-top:1px solid var(--bd);padding:14px;display:none}
.bcard-detail.open{display:block}
.badge-pagato{background:rgba(34,197,94,.15);color:var(--g);font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}
.badge-attesa{background:rgba(249,115,22,.15);color:var(--o);font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}

/* SUMMARY */
.sumbox{background:var(--bg2);border:1px solid var(--o);border-radius:8px;padding:14px;margin-bottom:12px}
.sumtitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--o);margin-bottom:10px}
.sumg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.suml{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:2px}
.sumv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end}
.mo{background:var(--bg2);border-top:2px solid var(--o);border-radius:16px 16px 0 0;padding:20px 18px calc(var(--sb)+20px);width:100%;max-height:85vh;overflow-y:auto}
.mo.mg{border-top-color:var(--g)}
.motitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.mox{float:right;background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer}

/* MISC */
.seclbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;margin-top:4px}
.empty{text-align:center;padding:36px 20px;color:var(--mu);font-size:13px;line-height:1.7;background:var(--bg2);border:1px solid var(--bd);border-radius:8px}
.warn{font-size:12px;color:var(--o);margin-bottom:10px}
.info{font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.5}
hr{border:none;border-top:1px solid var(--bd);margin:14px 0}
.delbtn{background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer;padding:2px 6px;-webkit-tap-highlight-color:transparent}
.delbtn:active{color:var(--r)}

/* STORICO detail boxes */
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.hstat{background:var(--bg3);border-radius:6px;padding:8px;text-align:center}
.hstatl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:3px}
.hstatv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}

/* PRINT */
@media print{
  body{background:#fff!important;color:#000!important;font-family:Arial,sans-serif}
  #app,.tabs,.hdr{display:none!important}
  #parea{display:block!important}
  .pp{padding:15mm;max-width:210mm;margin:0 auto}
  .ph{border-bottom:3px solid #000;padding-bottom:10px;margin-bottom:16px}
  .pht{font-size:18pt;font-weight:bold}
  .phs{font-size:10pt;color:#555;margin-top:4px}
  .psec{margin-bottom:14px}
  .psect{font-size:12pt;font-weight:bold;border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:8px}
  .ptbl{width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:10px}
  .ptbl th{background:#333!important;color:#fff!important;padding:5px 8px;text-align:left;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ptbl td{padding:4px 8px;border-bottom:1px solid #eee}
  .ptbl tr.tr td{font-weight:bold;background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pbox{border:2px solid #000;padding:12px;margin:12px 0;border-radius:4px}
  .pbox.pg{border-color:#22c55e;background:#f0fdf4!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pbox.po{border-color:#f97316;background:#fff7ed!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pamt{font-size:24pt;font-weight:900}
  .prow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee;font-size:9pt}
  .prow.pt{font-weight:bold;font-size:11pt;border-top:2px solid #000;border-bottom:none;margin-top:4px;padding-top:6px}
  .pfoot{margin-top:20px;border-top:1px solid #ccc;padding-top:10px;font-size:8pt;color:#888;display:flex;justify-content:space-between}
  .psig{margin-top:30px}
  @page{margin:15mm;size:A4}
}
#parea{display:none}
</style>
</head>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ── STATE ────────────────────────────────────────────────────────────────────
let tab='ciclo';
let costoKwh=LS.get('rt_kwh','');
let hist=LS.get('rt_hist',[]);
let ricAz=LS.get('rt_ricaz',[]);
let bollRef=LS.get('rt_boll',null);
let bimArch=LS.get('rt_bimarch',[]);
let cycle=LS.get('rt_cycle',{cruscotto:null,scontrino:null,ricCasa:null,ricLav:null});
let sOpen={}, sDetail={};

// ── HELPERS ──────────────────────────────────────────────────────────────────
function n(v){
  if(v===null||v===undefined||v==='')return 0;
  let s=String(v).trim().replace(/[^0-9.,-]/g,'');
  if(s.includes('.')&&s.includes(','))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(',','.');
  return parseFloat(s)||0;
}
function r2(v){return Math.round(v*100)/100}
function td(){return new Date().toISOString().split('T')[0]}
function fd(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('it-IT')}catch{return d}}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── BIMESTRE ─────────────────────────────────────────────────────────────────
function bimKey(dateStr){
  const d=dateStr?new Date(dateStr+'T12:00:00'):new Date();
  return `${d.getFullYear()}-B${Math.floor(d.getMonth()/2)+1}`;
}
function bimLbl(key){
  const nomi=['Gen-Feb','Mar-Apr','Mag-Giu','Lug-Ago','Set-Ott','Nov-Dic'];
  const m=key.match(/^(\d{4})-B(\d)$/);
  if(!m)return key;
  return `${nomi[parseInt(m[2])-1]} ${m[1]}`;
}
function bimMonths(key){
  const m=key.match(/^(\d{4})-B(\d)$/);
  if(!m)return[];
  const y=parseInt(m[1]),bi=parseInt(m[2])-1;
  return[`${y}-${String(bi*2+1).padStart(2,'0')}`,`${y}-${String(bi*2+2).padStart(2,'0')}`];
}
function curBim(){return bimKey(td())}

// ── TAB ──────────────────────────────────────────────────────────────────────
function sw(t){
  tab=t;
  ['ciclo','rimborso','storico','bolletta'].forEach(id=>{
    const el=document.getElementById('tb-'+id);
    if(!el)return;
    el.className='tab'+(id===t?(t==='rimborso'?' tg':' to'):'');
  });
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('main');
  if(!el)return;
  if(tab==='ciclo')el.innerHTML=rCiclo();
  else if(tab==='rimborso')el.innerHTML=rRimborso();
  else if(tab==='storico')el.innerHTML=rStorico();
  else el.innerHTML=rBolletta();
  attachEv();
}

function rCiclo(){
  const steps=[
    {k:'cruscotto',ico:'🚗',lbl:'Foto Cruscotto',done:!!cycle.cruscotto},
    {k:'scontrino',ico:'⛽',lbl:'Scontrino Pompa',done:!!cycle.scontrino},
    {k:'ricCasa',  ico:'🏠',lbl:'Ricariche Casa',done:!!cycle.ricCasa},
    {k:'ricLav',   ico:'🏢',lbl:'Ricariche Lavoro',done:!!cycle.ricLav},
  ];
  const cur=steps.findIndex(s=>!s.done);
  const all=cur===-1;
  let h=`<div class="wiz"><div class="dots">`;
  steps.forEach((s,i)=>h+=`<div class="dot${s.done?' dn':i===cur?' ac':''}"></div>`);
  h+=`</div><div class="wlbl">${all?'Pronto!':'Passo '+(cur+1)+' di 4'}</div>`;
  if(cycle.cruscotto||cycle.scontrino||cycle.ricCasa||cycle.ricLav)
    h+=`<button class="btn bgh bsm" style="margin-left:auto" onclick="resetCycle()">Reset</button>`;
  h+='</div>';
  steps.forEach((s,i)=>{
    const isA=i===cur,isD=s.done;
    h+=`<div class="card${isD?' cf':isA?' co':''}">
      <div class="ctitle"><span>${s.ico}</span>${s.lbl}${isD?'<span class="ck">✓</span>':''}</div>`;
    if(isD)h+=rStepSum(s.k);
    else if(isA)h+=rStepForm(s.k);
    h+='</div>';
  });
  if(all)h+=rFinalSum();
  return h;
}

function rStepSum(k){
  const d=cycle[k];if(!d)return'';
  if(k==='cruscotto')return`<div class="ex">
    <div class="exr"><span class="exk">KM Percorsi</span><span class="exv">${es(d.km)}</span></div>
    <div class="exr"><span class="exk">KM Elettrico</span><span class="exv g">${es(d.kmel)}</span></div>
    <div class="exr"><span class="exk">Data</span><span style="font-size:13px">${fd(d.data)}</span></div>
  </div>`;
  if(k==='scontrino'){const tot=n(d.litri)*n(d.prezzo);return`<div class="ex">
    <div class="exr"><span class="exk">Litri</span><span class="exv">${n(d.litri).toFixed(2)} L</span></div>
    <div class="exr"><span class="exk">€/Litro</span><span class="exv">€ ${n(d.prezzo).toFixed(3)}</span></div>
    <div class="exr"><span class="exk">Totale</span><span class="exv">€ ${tot.toFixed(2)}</span></div>
    ${d.staz?`<div class="exr"><span class="exk">Stazione</span><span style="font-size:12px">${es(d.staz)}</span></div>`:''}
  </div>`;}
  if(k==='ricCasa'){const cK=n(costoKwh);return`<div class="ex">
    <div class="exr"><span class="exk">kWh Casa</span><span class="exv b">${n(d.kwh).toFixed(2)} kWh</span></div>
    ${cK>0?`<div class="exr"><span class="exk">Costo</span><span class="exv">€ ${r2(n(d.kwh)*cK).toFixed(2)}</span></div>`:''}
  </div>`;}
  if(k==='ricLav'){const cK=n(costoKwh);return`<div class="ex">
    <div class="exr"><span class="exk">kWh Lavoro</span><span class="exv g">${n(d.kwh).toFixed(2)} kWh</span></div>
    ${cK>0?`<div class="exr"><span class="exk">Rimborso</span><span class="exv g">€ ${r2(n(d.kwh)*cK).toFixed(2)}</span></div>`:''}
  </div>`;}
  return'';
}

function rFinalSum(){
  const c=cycle;
  const litri=n(c.scontrino?.litri),prezzo=n(c.scontrino?.prezzo);
  const costoBenz=litri*prezzo;
  const kmPerc=n(c.cruscotto?.km),kmEl=n(c.cruscotto?.kmel);
  const kmTerm=Math.max(0,kmPerc-kmEl);
  const kwhCasa=n(c.ricCasa?.kwh),kwhLav=n(c.ricLav?.kwh);
  const cK=n(costoKwh);
  const costoEl=(kwhCasa+kwhLav)*cK;
  const rimborso=kwhLav*cK;
  const totCiclo=costoBenz+costoEl;
  const consumoT=litri>0&&kmTerm>0?r2(kmTerm/litri):null;
  const consumoC=litri>0&&kmPerc>0?r2(kmPerc/litri):null;
  const costKm=kmPerc>0?r2(totCiclo/kmPerc):null;
  return`<div class="sumbox">
    <div class="sumtitle">📊 Riepilogo Ciclo</div>
    <div class="sumg">
      <div><div class="suml">Benzina</div><div class="sumv" style="color:var(--o)">€ ${costoBenz.toFixed(2)}</div></div>
      <div><div class="suml">Elettrico tot.</div><div class="sumv" style="color:var(--b)">€ ${costoEl.toFixed(2)}</div></div>
      ${kmPerc>0?`<div><div class="suml">KM Percorsi</div><div class="sumv">${kmPerc}</div></div>`:''}
      ${kmEl>0?`<div><div class="suml">KM Elettrico</div><div class="sumv" style="color:var(--g)">${kmEl}</div></div>`:''}
      ${consumoT?`<div><div class="suml">Consumo term.</div><div class="sumv">${consumoT.toFixed(1)} km/L</div></div>`:''}
      ${costKm?`<div><div class="suml">Costo/km</div><div class="sumv">€ ${costKm.toFixed(3)}</div></div>`:''}
    </div>
  </div>
  ${rimborso>0?`<div class="rbox"><div class="rlbl">💶 Rimborso azienda</div><div class="ramt">€ ${rimborso.toFixed(2)}</div><div class="rdet">${kwhLav.toFixed(2)} kWh × € ${cK.toFixed(5)}/kWh</div></div>`:''}
  <button class="btn bo" onclick="saveFinal()" style="margin-bottom:8px">💾 Salva nel Registro</button>
  <button class="btn bgh" onclick="resetCycle()">Annulla</button>`;
}

function saveCruscotto(){
  const km=document.getElementById('f-km')?.value.trim();
  if(!km){showToast('Inserisci i KM percorsi',false,true);return}
  cycle.cruscotto={km,kmel:document.getElementById('f-kmel')?.value.trim()||'0',data:document.getElementById('f-data')?.value||td()};
  LS.set('rt_cycle',cycle);render();
}
function saveScontrino(){
  const litri=document.getElementById('f-litri')?.value.trim(),prezzo=document.getElementById('f-prezzo')?.value.trim();
  if(!litri||!prezzo){showToast('Inserisci litri e prezzo',false,true);return}
  cycle.scontrino={litri,prezzo,staz:document.getElementById('f-staz')?.value.trim()};
  LS.set('rt_cycle',cycle);render();
}
function saveRicCasa(){
  const kwh=document.getElementById('f-kwc')?.value.trim();
  if(!kwh){showToast('Inserisci i kWh',false,true);return}
  cycle.ricCasa={kwh};LS.set('rt_cycle',cycle);render();
}
function saveRicLav(){
  const kwh=document.getElementById('f-kwl')?.value.trim();
  if(!kwh){showToast('Inserisci i kWh',false,true);return}
  cycle.ricLav={kwh};LS.set('rt_cycle',cycle);render();
}
function resetCycle(){
  askConfirm('Azzerare il ciclo corrente?',()=>{
    cycle={cruscotto:null,scontrino:null,ricCasa:null,ricLav:null};
    LS.set('rt_cycle',cycle);render();
  });
}
function saveFinal(){
  const c=cycle;
  const litri=n(c.scontrino?.litri),prezzo=n(c.scontrino?.prezzo);
  const kwhCasa=n(c.ricCasa?.kwh),kwhLav=n(c.ricLav?.kwh);
  const cK=n(costoKwh);
  const costoEC=r2(kwhCasa*n(LS.get('rt_kwh_casa','')||costoKwh));
  hist.unshift({
    id:Date.now(),data:c.cruscotto?.data||td(),
    staz:c.scontrino?.staz||'',
    litri:c.scontrino?.litri,prezzo:c.scontrino?.prezzo,
    costoBenz:r2(litri*prezzo),
    km:c.cruscotto?.km,kmel:n(c.cruscotto?.kmel),
    kwhCasa,kwhLav,
    costoKwhAz:costoKwh,costoKwhCasa:LS.get('rt_kwh_casa','')||costoKwh,
    costoEC,rimborso:r2(kwhLav*cK)
  });
  LS.set('rt_hist',hist);
  cycle={cruscotto:null,scontrino:null,ricCasa:null,ricLav:null};
  LS.set('rt_cycle',cycle);
  sw('storico');
}

function rRimborso(){
  const cK=n(costoKwh);
  const curK=curBim();
  const curMs=bimMonths(curK);
  const ricCur=ricAz.filter(r=>curMs.includes((r.data||'').substring(0,7)));
  const totKwh=ricCur.reduce((s,r)=>s+n(r.kwh),0);
  const totImp=totKwh*cK;
  const rounded=Math.ceil(totImp);

  // Check bimestre change
  const activeK=LS.get('rt_bim_active',curK);
  let h='';
  if(activeK!==curK&&ricAz.length>0){
    h+=`<div style="background:rgba(249,115,22,.1);border:1px solid var(--o);border-radius:8px;padding:14px;margin-bottom:14px">
      <div class="ctitle" style="color:var(--o)">🔔 Nuovo bimestre</div>
      <div class="info">Sei nel bimestre <strong>${bimLbl(curK)}</strong>. Vuoi archiviare <strong>${bimLbl(activeK)}</strong>?</div>
      <div class="brow">
        <button class="btn bo bsm" onclick="archiviBim('${activeK}')">📦 Archivia e ricomincia</button>
        <button class="btn bgh bsm" onclick="LS.set('rt_bim_active','${curK}');render()">Ignora</button>
      </div>
    </div>`;

  // Header bimestre corrente
  h+=`<div style="background:var(--bg2);border:1px solid var(--g);border-radius:8px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g)">Bimestre corrente</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900">${bimLbl(curK)}</div></div>
    ${bimArch.length>0?`<button class="btn bgh bsm" onclick="toggleArchSec()">📦 Archivio (${bimArch.length})</button>`:''}
  </div>`;

  // 4 stat boxes
  h+=`<div class="sg4">
    <div class="sc"><div class="slbl">Ricariche</div><div class="sval">${ricCur.length}</div></div>
    <div class="sc"><div class="slbl">Totale kWh</div><div class="sval">${totKwh.toFixed(1)}</div></div>
    <div class="sc"><div class="slbl">Coefficiente</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:${cK?'24px':'28px'};font-weight:900;color:${cK?'var(--g)':'var(--mu)'};line-height:1;margin-top:4px">${cK?'€ '+cK.toFixed(5):'—'}</div>
      <div class="ssub"><span style="color:var(--g);cursor:pointer;text-decoration:underline" onclick="openMo('mo-kwh')">modifica</span></div>
    </div>
    <div class="sc" style="background:${cK&&totKwh>0?'rgba(34,197,94,.08)':'var(--bg2)'};border-color:${cK&&totKwh>0?'var(--g)':'var(--bd)'}">
      <div class="slbl">Da Rimborsare</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:${totImp>=100?'30px':'38px'};font-weight:900;color:${cK?'var(--g)':'var(--mu)'};line-height:1;margin-top:4px">${cK?'€ '+totImp.toFixed(2):'—'}</div>
      ${cK&&totKwh>0?`<div class="ssub" style="color:var(--g)">≈ € ${rounded},00 arrotondato</div>`:''}
    </div>
  </div>`;

  // Bolletta pill
  if(bollRef){
    h+=`<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">

      <div style="font-size:13px;font-weight:500">N. ${es(bollRef.numero||'—')} · ${es(bollRef.periodo||'—')}</div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--g)">€ ${n(bollRef.coefficiente).toFixed(5)}</div>
      <div style="font-size:9px;color:var(--mu)">/kWh</div></div>

    h+=`<div style="background:rgba(249,115,22,.06);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:12px;cursor:pointer" onclick="sw('bolletta')">

      rows.forEach(r=>{
        h+=`<div class="rcrow">
          <span class="rcdt">${fd(r.data)}</span>
          <span class="rckw">${n(r.kwh).toFixed(2)} kWh</span>
          ${r.note?`<span style="font-size:10px;color:var(--mu);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${es(r.note)}</span>`:'<span style="flex:1"></span>'}
          <span class="rcimp">${cK?`<strong>€ ${r2(n(r.kwh)*cK).toFixed(2)}</strong>`:''}</span>
          <button class="delbtn" onclick="delRic(${r.id})">✕</button>
        </div>`;
      });
      h+='</div>';
    });
    h+=`<button class="btn bgh" style="margin-top:4px" onclick="svuotaBim()">🗑️ Svuota bimestre</button>`;
  }

  // Archivio bimestri
  h+=`<div id="arch-sec" style="display:none;margin-top:16px">
    <div class="seclbl">📦 Storico Rimborsi</div>`;
  bimArch.forEach((b,i)=>{
    const pagato=!!b.pagato;
    const bc=pagato?'var(--g)':'rgba(249,115,22,.5)';
    const badge=pagato?`<span class="badge-pagato">✓ PAGATO ${fd(b.dataPag)}</span>`:`<span class="badge-attesa">⏳ DA PAGARE</span>`;
    h+=`<div class="bcard" style="border:1px solid ${bc}">
      <div class="bcard-hdr" onclick="toggleBimD(${i})">
        <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900">${es(b.label)}</div>
        <div style="margin-top:4px">${badge}</div></div>
        <div style="text-align:right">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:${pagato?'var(--g)':'var(--o)'}">€ ${Math.ceil(n(b.totImp))},00</div>
          <div style="font-size:10px;color:var(--mu)">${n(b.totKwh).toFixed(2)} kWh · esatto € ${n(b.totImp).toFixed(2)}</div>
        </div>
      </div>
      <div class="bcard-detail" id="bd-${i}">
        ${b.bolletta?`<div style="background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:10px;font-size:12px">
          <div style="color:var(--mu);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Bolletta</div>
          <div>N. ${es(b.bolletta.numero||'—')} · ${es(b.bolletta.periodo||'—')}</div>
          <div style="color:var(--g)">Coeff. € ${n(b.bolletta.coefficiente).toFixed(5)}/kWh</div>
        </div>`:''}
        ${rBimDettaglio(b)}
        <div style="background:${pagato?'rgba(34,197,94,.08)':'rgba(249,115,22,.08)'};border:1px solid ${pagato?'var(--g)':'var(--o)'};border-radius:6px;padding:12px;margin-top:8px">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px">Riepilogo importi</div>
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px"><span style="color:var(--mu)">Importo tecnico esatto</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700">€ ${n(b.totImp).toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px"><span style="color:var(--mu)">Arrotondamento</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--mu)">+ € ${(Math.ceil(n(b.totImp))-n(b.totImp)).toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:7px 0 0;font-size:12px"><span style="font-weight:700;color:${pagato?'var(--g)':'var(--o)'}">Da pagare</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:${pagato?'var(--g)':'var(--o)'}">€ ${Math.ceil(n(b.totImp))},00</span></div>
        </div>
        <div class="brow" style="margin-top:12px">
          <button class="btn bgh bsm" onclick="doPrint('rimborso',${i})">⬇️ PDF Rimborso</button>
          ${!pagato?`<button class="btn bg bsm" onclick="openPagMo(${i})">✓ Segna pagato</button>`:`<div class="brow"><button class="btn bgh bsm" onclick="doPrint('ricevuta',${i})">🧾 PDF Ricevuta</button><button class="btn bsm" style="border:1px solid var(--r);color:var(--r);background:transparent;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:5px;cursor:pointer" onclick="annullaPag(${i})">↩️ Annulla</button></div>`}
          <button class="delbtn" onclick="delBim(${i})">✕</button>
        </div>
      </div>
    </div>`;
  });
  h+='</div>';
  return h;
}

function rBimDettaglio(b){
  const cK=n(b.costoKwh);
  const byM={};
  (b.ricariche||[]).forEach(r=>{const k=(r.data||'').substring(0,7);if(!byM[k])byM[k]=[];byM[k].push(r)});
  return Object.keys(byM).sort().map(m=>{
    const rows=byM[m].sort((a,b)=>a.data>b.data?1:-1);
    const mKwh=rows.reduce((s,r)=>s+n(r.kwh),0);
    const [y,mo]=m.split('-');
    const mLbl=new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
    return`<div style="margin-bottom:8px">
      <div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${mLbl}</div>
      ${rows.map(r=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--bd)">
        <span style="color:var(--mu)">${fd(r.data)}</span>
        <span style="color:var(--g);font-weight:600">${n(r.kwh).toFixed(2)} kWh</span>
        <span>${cK>0?'€ '+r2(n(r.kwh)*cK).toFixed(2):'—'}</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;font-weight:700">
        <span>Tot. ${mLbl.split(' ')[0]}</span><span style="color:var(--g)">${mKwh.toFixed(2)} kWh</span><span>${cK>0?'€ '+r2(mKwh*cK).toFixed(2):'—'}</span>
      </div>
    </div>`;
  }).join('');
}

function toggleBimD(i){
  const el=document.getElementById('bd-'+i);
  if(!el)return;
  el.classList.toggle('open');
}
function toggleArchSec(){
  const el=document.getElementById('arch-sec');
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function archiviBim(oldK){
  const cK=n(costoKwh);
  const totKwh=ricAz.reduce((s,r)=>s+n(r.kwh),0);
  bimArch.unshift({
    key:oldK,label:bimLbl(oldK),
    ricariche:[...ricAz],bolletta:bollRef?{...bollRef}:null,
    costoKwh,totKwh,totImp:r2(totKwh*cK),
    archiviato:td(),pagato:false
  });
  ricAz=[];bollRef=null;
  LS.set('rt_bimarch',bimArch);LS.set('rt_ricaz',ricAz);LS.set('rt_boll',null);
  LS.set('rt_bim_active',curBim());render();
}

// ── RICARICHE AZIENDA ─────────────────────────────────────────────────────────
function saveRicManuale(){
  const kwh=document.getElementById('ric-kwh')?.value.trim();
  if(!kwh){showToast('Inserisci i kWh',false,true);return}
  ricAz.push({id:Date.now(),data:document.getElementById('ric-data')?.value||td(),kwh,note:document.getElementById('ric-note')?.value.trim()||''});
  ricAz.sort((a,b)=>b.data>a.data?1:-1);
  LS.set('rt_ricaz',ricAz);closeMo('mo-ric');render();
}
function delRic(id){ricAz=ricAz.filter(r=>r.id!==id);LS.set('rt_ricaz',ricAz);render()}
function svuotaBim(){
  askConfirm('Svuotare il bimestre corrente?',()=>{
    const curMs=bimMonths(curBim());
    ricAz=ricAz.filter(r=>!curMs.includes((r.data||'').substring(0,7)));
    LS.set('rt_ricaz',ricAz);render();
  });
}
function delBim(i){
  askConfirm('Eliminare questo bimestre archiviato?',()=>{
    bimArch.splice(i,1);LS.set('rt_bimarch',bimArch);render();
  });
}
function openFotoAz(){
  const inp=document.getElementById('az-fi');
  inp.value='';
  inp.onchange=e=>{if(e.target.files[0])extractAz(e.target.files[0])};
  inp.click();
}

// ── PAGAMENTO ─────────────────────────────────────────────────────────────────
function openPagMo(idx){
  const b=bimArch[idx];if(!b)return;
  document.getElementById('pag-idx').value=idx;
  document.getElementById('pag-data').value=td();
  document.getElementById('pag-note').value='';
  document.getElementById('pag-lbl').textContent=b.label;
  document.getElementById('pag-imp').textContent='€ '+Math.ceil(n(b.totImp))+',00';
  openMo('mo-pag');
}
function salvaPag(){
  const idx=parseInt(document.getElementById('pag-idx').value);
  const data=document.getElementById('pag-data').value;
  if(!data){showToast('Inserisci la data',false,true);return}
  bimArch[idx].pagato=true;
  bimArch[idx].dataPag=data;
  bimArch[idx].notePag=document.getElementById('pag-note').value.trim();
  LS.set('rt_bimarch',bimArch);
  closeMo('mo-pag');render();
  setTimeout(()=>doPrint('ricevuta',idx),400);
}
function annullaPag(idx){
  askConfirm('Annullare il pagamento?',()=>{
    bimArch[idx].pagato=false;
    delete bimArch[idx].dataPag;delete bimArch[idx].notePag;
    LS.set('rt_bimarch',bimArch);render();
  });
}

// STORICO TAB

function rStorico(){
  if(!hist.length)return`<div class="empty">Nessun ciclo salvato.<br/>Completa il primo ciclo nella tab Ciclo.</div>`;

    <div class="sc"><div class="slbl">Cicli</div><div class="sval">${hist.length}</div></div>

    <div style="text-align:right;font-size:11px;color:var(--mu)">⛽ € ${totB.toFixed(2)}<br/>🏠 € ${totEC.toFixed(2)}<br/>🏢 € ${totR.toFixed(2)}</div>
  </div>
  <button class="btn bo" style="margin-bottom:14px" onclick="openMo('mo-nrif')">➕ Aggiungi rifornimento mancante</button>`;

  hist.forEach(hh=>{
    const isOpen=!!sOpen[hh.id],isDet=!!sDetail[hh.id];
    const cKAz=n(hh.costoKwhAz||costoKwh);
    const cKCa=n(hh.costoKwhCasa||LS.get('rt_kwh_casa','')||costoKwh);
    const costoEC=n(hh.costoEC)||r2(n(hh.kwhCasa)*cKCa);
    const totCiclo=n(hh.costoBenz)+costoEC+n(hh.rimborso);
    const manca=!n(hh.kwhCasa)&&!costoEC;

    h+=`<div class="hi" style="border-color:${isOpen?'var(--o)':isDet?'rgba(249,115,22,.4)':'var(--bd)'}">
      <div class="hidate">
        <span>${fd(hh.data)}${hh.staz?' · '+es(hh.staz):''}</span>
        <div class="brow" style="gap:6px">
          <button class="btn bgh bsm" onclick="toggleDet(${hh.id})" title="Dettaglio">📊</button>
          <button class="btn bgh bsm" onclick="toggleOpen(${hh.id})" title="Modifica">${isOpen?'▲':'✏️'}</button>
          <button class="delbtn" onclick="delHist(${hh.id})">✕</button>
        </div>
      </div>
      <div class="hig4" onclick="toggleDet(${hh.id})" style="cursor:pointer">
        <div class="hib" style="background:rgba(249,115,22,.08)">
          <div class="hibl" style="color:var(--o)">⛽ Benzina</div>
          <div class="hibv" style="color:var(--o)">€ ${n(hh.costoBenz).toFixed(2)}</div>
          <div class="hibsub">${n(hh.litri).toFixed(1)} L · € ${n(hh.prezzo).toFixed(3)}/L</div>
        </div>
        <div class="hib" style="background:rgba(59,130,246,.08);${manca?'border:1px solid var(--r)':''}">
          <div class="hibl" style="color:var(--b)">🏠 Casa</div>
          ${manca?`<div style="font-size:11px;color:var(--r)">kWh da inserire ✏️</div>`:`<div class="hibv" style="color:var(--b)">€ ${costoEC.toFixed(2)}</div><div class="hibsub">${n(hh.kwhCasa).toFixed(1)} kWh</div>`}
        </div>
        <div class="hib" style="background:rgba(249,115,22,.05)">
          <div class="hibl">💰 Totale</div>
          <div class="hibv">€ ${totCiclo.toFixed(2)}</div>
          <div class="hibsub">benz+casa+az.</div>
        </div>
        <div class="hib" style="background:rgba(34,197,94,.08)">
          <div class="hibl" style="color:var(--g)">🏢 Rimborso</div>
          <div class="hibv" style="color:var(--g)">€ ${n(hh.rimborso).toFixed(2)}</div>
          <div class="hibsub">${n(hh.kwhLav).toFixed(1)} kWh</div>
        </div>
      </div>
      ${isDet?`<div class="hstats">
        <div class="hstat"><div class="hstatl">KM percorsi</div><div class="hstatv">${es(hh.km)||'—'}</div></div>
        <div class="hstat"><div class="hstatl" style="color:var(--g)">KM elettrico</div><div class="hstatv" style="color:var(--g)">${es(hh.kmel)||'—'}</div></div>
        <div class="hstat"><div class="hstatl" style="color:var(--o)">KM termico</div><div class="hstatv" style="color:var(--o)">${hh.km&&hh.kmel?Math.max(0,n(hh.km)-n(hh.kmel)).toFixed(1):'—'}</div></div>
        ${hh.km&&n(hh.litri)>0&&n(hh.km)>n(hh.kmel)?`<div class="hstat"><div class="hstatl" style="color:var(--o)">km/L term.</div><div class="hstatv" style="color:var(--o)">${r2((n(hh.km)-n(hh.kmel))/n(hh.litri)).toFixed(1)}</div></div>`:''}
        ${hh.km&&n(hh.litri)>0?`<div class="hstat"><div class="hstatl">km/L comb.</div><div class="hstatv">${r2(n(hh.km)/n(hh.litri)).toFixed(1)}</div></div>`:''}
        ${totCiclo>0&&hh.km?`<div class="hstat"><div class="hstatl">€/km</div><div class="hstatv">${r2(totCiclo/n(hh.km)).toFixed(3)}</div></div>`:''}
      </div>`:''}
      ${isOpen?`<div style="border-top:1px solid var(--bd);padding-top:14px;margin-top:10px">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:10px">✏️ Modifica</div>

        <div class="fl"><label>KM Percorsi</label><input type="text" id="se-km-${hh.id}" value="${es(String(hh.km||''))}" inputmode="decimal" placeholder="es. 542.8"/></div>

        <div class="fg"><div class="fl"><label>kWh Casa</label><input type="text" id="se-kwc-${hh.id}" value="${es(String(hh.kwhCasa||'0'))}" inputmode="decimal" style="border-color:rgba(59,130,246,.4)"/></div>
        <div class="fl"><label>€/kWh Casa</label><input type="text" id="se-kwcc-${hh.id}" value="${es(String(hh.costoKwhCasa||''))}" inputmode="decimal" style="border-color:rgba(59,130,246,.4)"/></div></div>
        <div style="font-size:10px;font-weight:700;color:var(--g);margin-bottom:6px">🏢 LAVORO</div>
        <div class="fg" style="margin-bottom:14px"><div class="fl"><label>kWh Lavoro</label><input type="text" id="se-kwl-${hh.id}" value="${es(String(hh.kwhLav||'0'))}" inputmode="decimal" style="border-color:rgba(34,197,94,.4)"/></div>
        <div class="fl"><label>€/kWh Az.</label><input type="text" id="se-kwla-${hh.id}" value="${es(String(hh.costoKwhAz||costoKwh))}" inputmode="decimal" style="border-color:rgba(34,197,94,.4)"/></div></div>
        <button class="btn bo" onclick="saveStorico(${hh.id})">💾 Salva modifiche</button>
      </div>`:''}
    </div>`;
  });
  return h;
}

function toggleOpen(id){sOpen[id]=!sOpen[id];if(sOpen[id])sDetail[id]=false;render()}
function toggleDet(id){sDetail[id]=!sDetail[id];if(sDetail[id])sOpen[id]=false;render()}
function delHist(id){askConfirm('Eliminare questo ciclo?',()=>{hist=hist.filter(h=>h.id!==id);LS.set('rt_hist',hist);render()})}
function saveStorico(id){
  const idx=hist.findIndex(h=>h.id===id);if(idx===-1)return;
  const h=hist[idx];
  const km=n(document.getElementById('se-km-'+id)?.value);
  const kmel=n(document.getElementById('se-kmel-'+id)?.value);
  const litri=document.getElementById('se-litri-'+id)?.value.trim();
  const prezzo=document.getElementById('se-prezzo-'+id)?.value.trim();
  const kwhCasa=n(document.getElementById('se-kwc-'+id)?.value);
  const cKwhCasa=document.getElementById('se-kwcc-'+id)?.value.trim();
  const kwhLav=n(document.getElementById('se-kwl-'+id)?.value);
  const cKwhAz=document.getElementById('se-kwla-'+id)?.value.trim();
  const costoEC=r2(kwhCasa*n(cKwhCasa));
  hist[idx]={...h,
    data:document.getElementById('se-data-'+id)?.value||h.data,
    staz:document.getElementById('se-staz-'+id)?.value.trim(),
    litri,prezzo,km,kmel,
    costoBenz:r2(n(litri)*n(prezzo)),
    kwhCasa,costoKwhCasa:cKwhCasa,costoEC,
    kwhLav,costoKwhAz:cKwhAz,
    rimborso:r2(kwhLav*n(cKwhAz))
  };
  LS.set('rt_hist',hist);sOpen[id]=false;render();
}
function saveNRif(){
  const data=document.getElementById('nr-data')?.value;
  const litri=document.getElementById('nr-litri')?.value.trim();
  const prezzo=document.getElementById('nr-prezzo')?.value.trim();
  if(!data||!litri||!prezzo){showToast('Inserisci almeno data, litri e €/litro',false,true);return}
  const km=document.getElementById('nr-km')?.value.trim();
  const kmel=n(document.getElementById('nr-kmel')?.value);
  const kwhCasa=n(document.getElementById('nr-kwc')?.value);
  const cKwhCasa=document.getElementById('nr-kwcc')?.value.trim();
  const kwhLav=n(document.getElementById('nr-kwl')?.value);
  const cKwhAz=document.getElementById('nr-kwla')?.value.trim();
  const costoEC=r2(kwhCasa*n(cKwhCasa));
  hist.push({id:Date.now(),data,staz:document.getElementById('nr-staz')?.value.trim()||'',
    litri,prezzo,km,kmel,costoBenz:r2(n(litri)*n(prezzo)),
    kwhCasa,costoKwhCasa:cKwhCasa,costoEC,
    kwhLav,costoKwhAz:cKwhAz,rimborso:r2(kwhLav*n(cKwhAz))
  });
  hist.sort((a,b)=>a.data<b.data?1:-1);
  LS.set('rt_hist',hist);closeMo('mo-nrif');sw('storico');
  showToast('✓ Rifornimento aggiunto!',true);
}

  <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--o);margin-bottom:10px">🏢 Bolletta Aziendale</div>

function saveBollAz(){
  const totale=n(document.getElementById('b-tot')?.value);
  const sconto=n(document.getElementById('b-sc')?.value);
  const kwhtot=n(document.getElementById('b-kwh')?.value);
  const manuale=n(document.getElementById('b-coeff')?.value);
  let coeff=manuale;
  if(!coeff&&totale>0&&kwhtot>0)coeff=r2((totale-sconto)/kwhtot*100000)/100000;
  bollRef={
    numero:document.getElementById('b-num')?.value.trim(),
    data:document.getElementById('b-data')?.value,
    consumoTot:document.getElementById('b-kwh')?.value.trim(),
    totaleFattura:document.getElementById('b-tot')?.value.trim(),
    scontoSoci:document.getElementById('b-sc')?.value.trim(),
    periodo:document.getElementById('b-per')?.value.trim(),
    nota:document.getElementById('b-nota')?.value.trim(),
    coefficiente:coeff
  };
  LS.set('rt_boll',bollRef);
  if(coeff){costoKwh=String(coeff);LS.set('rt_kwh',costoKwh)}
  const arch=LS.get('rt_boll_arch',[]);
  arch.unshift({tipo:'aziendale',periodo:bollRef.periodo,coeff,data:td()});
  LS.set('rt_boll_arch',arch);
  render();showToast('✓ Bolletta salvata! Coeff: € '+coeff.toFixed(5)+'/kWh',true);
}
function saveBollCasa(){
  const totale=n(document.getElementById('bc-tot')?.value);
  const kwhtot=n(document.getElementById('bc-kwh')?.value);
  const manuale=n(document.getElementById('bc-coeff')?.value);
  let coeff=manuale;
  if(!coeff&&totale>0&&kwhtot>0)coeff=r2(totale/kwhtot*10000)/10000;
  if(!coeff){showToast('Inserisci €/kWh o totale+kWh',false,true);return}
  const periodo=document.getElementById('bc-per')?.value.trim();
  LS.set('rt_kwh_casa',String(coeff));
  LS.set('rt_boll_casa',{periodo,totaleFattura:document.getElementById('bc-tot')?.value.trim(),consumoTot:document.getElementById('bc-kwh')?.value.trim(),costoKwh:coeff});
  // Ricalcola storico bimestre corrente
  const curMs=bimMonths(curBim());
  let count=0;
  hist=hist.map(h=>{
    const hm=(h.data||'').substring(0,7);
    if(curMs.includes(hm)&&n(h.kwhCasa)>0){
      count++;
      return{...h,costoKwhCasa:String(coeff),costoEC:r2(n(h.kwhCasa)*coeff)};

  });

  render();showToast('✓ Bolletta casa salvata! € '+coeff.toFixed(4)+'/kWh · '+count+' cicli aggiornati',true);
}

async function toB64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
}
async function callClaude(file,prompt,maxTok=400){
  const b64=await toB64(file);
  const isImg=file.type.startsWith('image/');
  const block=isImg?{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}}:{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}};
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:[block,{type:'text',text:prompt}]}]})
  });
  const data=await res.json();
  return data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'');
}
function showPrev(file,id){const el=document.getElementById(id);if(!el)return;el.innerHTML=file.type.startsWith('image/')?`<img src="${URL.createObjectURL(file)}" class="uprev"/>`:`<div style="color:var(--g);font-size:13px">📄 ${es(file.name)}</div>`}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg,ok,err){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:50%;transform:translateX(-50%);background:#222;border:1px solid '+(err?'var(--r)':ok?'var(--g)':'var(--o)')+';border-radius:8px;padding:10px 18px;font-size:13px;color:'+(err?'var(--r)':ok?'var(--g)':'var(--o)')+';z-index:300;white-space:nowrap';
  t.textContent=msg;document.body.appendChild(t);
  if(ok||err)setTimeout(()=>{if(document.body.contains(t))document.body.removeChild(t)},2000);
  return t;
}
function removeToast(t){if(t&&document.body.contains(t))document.body.removeChild(t)}

function doPrint(tipo,bimIdx){
  let ricariche,bRef,cKwh,periodo;
  if(bimIdx!==null&&bimIdx!==undefined){
    const b=bimArch[bimIdx];if(!b)return;
    ricariche=b.ricariche||[];bRef=b.bolletta;cKwh=n(b.costoKwh);periodo=b.label;
  } else {
    const curMs=bimMonths(curBim());
    ricariche=ricAz.filter(r=>curMs.includes((r.data||'').substring(0,7)));
    bRef=bollRef;cKwh=n(costoKwh);
    const months=Object.keys(ricariche.reduce((m,r)=>{const k=(r.data||'').substring(0,7);m[k]=1;return m},{})).sort();
    const mLbl=m=>{const[y,mo]=m.split('-');return new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'})};
    const f=months[0]||'',l=months[months.length-1]||'';
    periodo=f===l?mLbl(f):(f&&l?mLbl(f)+' - '+mLbl(l):'');
  }
  const isPag=tipo==='ricevuta'&&bimIdx!==null&&bimArch[bimIdx]?.pagato;
  const bPag=isPag?bimArch[bimIdx]:null;
  const byM={};ricariche.forEach(r=>{const k=(r.data||'').substring(0,7);if(!byM[k])byM[k]=[];byM[k].push(r)});
  const months=Object.keys(byM).sort();
  const mLbl=m=>{const[y,mo]=m.split('-');return new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'})};
  let totKwh=0,totImp=0,mHTML='';
  months.forEach(m=>{
    const rows=byM[m].sort((a,b)=>a.data>b.data?1:-1);
    const mK=rows.reduce((s,r)=>s+n(r.kwh),0);const mI=r2(mK*cKwh);
    totKwh+=mK;totImp+=mI;
    mHTML+=`<div class="psec"><div class="psect">Dettaglio ricariche - ${mLbl(m)}</div>
      <table class="ptbl"><thead><tr><th>Data</th><th>kWh</th><th style="text-align:right">Importo</th></tr></thead><tbody>
      ${rows.map(r=>`<tr><td>${fd(r.data)}</td><td>${n(r.kwh).toFixed(2)}</td><td style="text-align:right">${cKwh>0?'EUR '+r2(n(r.kwh)*cKwh).toFixed(2):'-'}</td></tr>`).join('')}
      <tr class="tr"><td colspan="2"><strong>Tot. ${mLbl(m).split(' ')[0]}: ${mK.toFixed(2)} kWh</strong></td><td style="text-align:right"><strong>EUR ${mI.toFixed(2)}</strong></td></tr>
      </tbody></table></div>`;
  });
  const rounded=Math.ceil(totImp);
  document.getElementById('parea').innerHTML=`<div class="pp">
    <div class="ph"><div class="pht">${isPag?'Ricevuta di pagamento rimborso energia':'Riepilogo rimborso energia'}</div>
    <div class="phs">Ricariche mezzo aziendale - ${es(periodo)}</div>
    <div style="font-size:8pt;color:#888;margin-top:4px">Generato il ${new Date().toLocaleDateString('it-IT')}</div></div>
    ${isPag?`<div class="pbox pg"><div style="font-weight:bold;color:#166534">PAGAMENTO AVVENUTO</div>
      <div>Data: <strong>${fd(bPag.dataPag)}</strong></div>
      ${bPag.notePag?`<div>Note: ${es(bPag.notePag)}</div>`:''}</div>`:''}
    <div class="psec"><div class="psect">Bolletta di riferimento</div>
      <table class="ptbl"><tbody>
        <tr><td><strong>Bolletta</strong></td><td>${bRef?'N. '+es(bRef.numero||'—')+' - '+es(bRef.periodo||periodo):'—'}</td></tr>
        <tr><td><strong>Consumo totale</strong></td><td>${bRef?(es(bRef.consumoTot)+' kWh'):'—'}</td></tr>
        <tr><td><strong>Totale bolletta</strong></td><td>${bRef?'EUR '+parseFloat(bRef.totaleFattura||0).toFixed(2):'—'}</td></tr>
        <tr><td><strong>Sconto soci</strong></td><td>${bRef?'EUR -'+parseFloat(bRef.scontoSoci||0).toFixed(2):'—'}</td></tr>
        <tr><td><strong>Coefficiente</strong></td><td>EUR ${cKwh.toFixed(5)} per kWh</td></tr>
      </tbody></table></div>
    ${mHTML}
    <div class="psec"><div class="psect">Riepilogo finale</div>
      <table class="ptbl"><thead><tr><th>Periodo</th><th>kWh</th><th style="text-align:right">Importo</th></tr></thead><tbody>
        ${months.map(m=>{const mK=byM[m].reduce((s,r)=>s+n(r.kwh),0);return`<tr><td>${mLbl(m)}</td><td>${mK.toFixed(2)} kWh</td><td style="text-align:right">EUR ${r2(mK*cKwh).toFixed(2)}</td></tr>`}).join('')}
        <tr class="tr"><td><strong>Totale bimestre</strong></td><td><strong>${r2(totKwh).toFixed(2)} kWh</strong></td><td style="text-align:right"><strong>EUR ${r2(totImp).toFixed(2)}</strong></td></tr>
      </tbody></table></div>
    <div class="pbox ${isPag?'pg':'po'}">
      <div style="font-size:10pt;font-weight:bold">${isPag?'Importo pagato':'Importo da pagare'}</div>
      <div class="pamt">EUR ${rounded},00</div>
      <div style="font-size:9pt;margin-top:4px">Importo esatto EUR ${r2(totImp).toFixed(2)} + arrotondamento EUR ${(rounded-r2(totImp)).toFixed(2)}</div>
    </div>
    ${bRef&&bRef.nota?`<div style="font-size:8pt;color:#666;margin:8px 0;font-style:italic">Nota: ${es(bRef.nota)}</div>`:''}
    <div class="psig">Firma per presa visione ____________________________</div>
    <div class="pfoot"><span>RangerTrack</span><span>${es(periodo)}</span></div>
  </div>`;
  setTimeout(()=>{window.print();setTimeout(()=>{document.getElementById('parea').innerHTML=''},1500)},300);
}

// ══════════════════════════════════════════════════════════════════════════════
// BACKUP
// ══════════════════════════════════════════════════════════════════════════════
function fillBkSum(){
  const el=document.getElementById('bk-sum');
  if(!el)return;
  el.innerHTML=`<div>📋 Cicli: <strong>${hist.length}</strong></div>
    <div>🏢 Ricariche az.: <strong>${ricAz.length}</strong></div>
    <div>📦 Bimestri archiviati: <strong>${bimArch.length}</strong></div>
    <div>⚡ €/kWh az.: <strong>${costoKwh||'—'}</strong></div>
    <div>🏠 €/kWh casa: <strong>${LS.get('rt_kwh_casa','')||'—'}</strong></div>
    <div style="margin-top:6px;color:var(--o)">Ultimo backup: <strong>${LS.get('rt_last_bk','mai')}</strong></div>`;
}
function expData(){
  const data={version:3,exportDate:new Date().toISOString(),
    rt_hist:hist,rt_ricaz:ricAz,rt_bimarch:bimArch,
    rt_boll:bollRef,rt_boll_casa:LS.get('rt_boll_casa',null),
    rt_boll_arch:LS.get('rt_boll_arch',[]),
    rt_kwh:costoKwh,rt_kwh_casa:LS.get('rt_kwh_casa',''),
    rt_bim_active:LS.get('rt_bim_active',''),
    rt_cycle:cycle
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='rangertrack_backup_'+td()+'.json';a.click();
  URL.revokeObjectURL(url);
  LS.set('rt_last_bk',new Date().toLocaleDateString('it-IT'));
  fillBkSum();
}
function impData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version)throw new Error('File non valido');
      if(data.rt_hist){hist=data.rt_hist;LS.set('rt_hist',hist)}
      if(data.rt_ricaz){ricAz=data.rt_ricaz;LS.set('rt_ricaz',ricAz)}
      if(data.rt_bimarch){bimArch=data.rt_bimarch;LS.set('rt_bimarch',bimArch)}
      if(data.rt_boll){bollRef=data.rt_boll;LS.set('rt_boll',bollRef)}
      if(data.rt_kwh!==undefined){costoKwh=data.rt_kwh;LS.set('rt_kwh',costoKwh)}
      if(data.rt_kwh_casa!==undefined)LS.set('rt_kwh_casa',data.rt_kwh_casa);
      if(data.rt_boll_casa)LS.set('rt_boll_casa',data.rt_boll_casa);
      if(data.rt_boll_arch)LS.set('rt_boll_arch',data.rt_boll_arch);
      if(data.rt_cycle){cycle=data.rt_cycle;LS.set('rt_cycle',cycle)}
      // compatibilita con versioni precedenti
      if(data.rt_history_v2&&!data.rt_hist){hist=data.rt_history_v2;LS.set('rt_hist',hist)}
      if(data.rt_ricariche_az&&!data.rt_ricaz){ricAz=data.rt_ricariche_az;LS.set('rt_ricaz',ricAz)}
      if(data.rt_bimestri_archivio&&!data.rt_bimarch){bimArch=data.rt_bimestri_archivio;LS.set('rt_bimarch',bimArch)}
      const res=document.getElementById('imp-res');
      if(res)res.innerHTML=`<div style="color:var(--g);padding:8px;background:rgba(34,197,94,.08);border-radius:6px;font-size:12px">
        ✓ Importazione completata!<br/>${hist.length} cicli · ${ricAz.length} ricariche az.</div>`;
      setTimeout(()=>{closeMo('mo-backup');render()},1500);
    }catch(err){
      const res=document.getElementById('imp-res');
      if(res)res.innerHTML=`<div style="color:var(--r);padding:8px;font-size:12px">Errore: ${err.message}</div>`;
    }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════════════════════════════
// ATTACH EVENTS
// ══════════════════════════════════════════════════════════════════════════════
function attachEv(){
  const map=[
    ['fi-cr',extractCruscotto],
    ['fi-sc',extractScontrino],
    ['fi-ca',f=>extractRic(f,'casa')],
    ['fi-la',f=>extractRic(f,'lavoro')],
    ['fi-baz',f=>extractBoll(f,'az')],
    ['fi-bca',f=>extractBoll(f,'casa')],
  ];
  map.forEach(([id,fn])=>{const el=document.getElementById(id);if(el)el.addEventListener('change',e=>{if(e.target.files[0])fn(e.target.files[0])})});
  const impFi=document.getElementById('imp-fi');
  if(impFi)impFi.onchange=e=>{if(e.target.files[0])impData(e.target.files[0])};
  const rData=document.getElementById('ric-data');
  if(rData&&!rData.value)rData.value=td();
}

// Preload bimestri storici se archivio vuoto (dati in preload_bimestri.json)
(async function(){
  const existing = LS.get('rt_bimarch', []);
  if(existing.length !== 0) return;
  try{
    const r = await fetch('preload_bimestri.json');
    if(!r.ok) return;
    const preload = await r.json();
    if(Array.isArray(preload) && preload.length){
      bimArch = preload;
      LS.set('rt_bimarch', bimArch);
      if(tab==='rimborso') render();
    }
  }catch{}
})();
